<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F172A">
    <title>Offline - ImpactMojo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amaranth', sans-serif;
            background: #0F172A;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .offline-container {
            max-width: 480px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.7;
        }
        h1 {
            font-family: 'Inter', 'Amaranth', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #F8FAFC;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #94A3B8;
            margin-bottom: 1.5rem;
        }
        .offline-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn-primary {
            background: #0EA5E9;
            color: #FFF;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: #0EA5E9;
            border: 1px solid #1E293B;
        }
        .btn-secondary:hover {
            border-color: #0EA5E9;
        }
        .hint {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748B;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">&#x1F4F6;</div>
        <h1>You are offline</h1>
        <p>It looks like you have lost your internet connection. Any courses you have previously downloaded are still available.</p>
        <div class="offline-actions">
            <button class="btn btn-primary" onclick="window.location.reload()">Try again</button>
            <a class="btn btn-secondary" href="/">Go to homepage</a>
        </div>
        <p class="hint">Tip: Use the "Download for Offline" button on any course page to make it available without internet.</p>
    </div>
</body>
</html>
