`,v=[{num:"Chapter 1",title:"Introduction",sub:"Why charts are not graphics — and why the distinction matters",summary:"Wilkinson opens by distinguishing graphics from charts. Charts are instances of named types — pie chart, bar chart, scatterplot. Graphics are more general objects defined by a grammar of components. A pie chart, properly understood, is a divided bar in polar coordinates; recognising this allows us to construct other polar graphics that a chart typology would never suggest. The chapter introduces object-oriented design as the intellectual basis for the system.",ideas:["Chart typologies constrain thinking: if your tool lists 'bar chart' as an option, you never ask what else you can do with bars","A pie chart is a stacked bar chart in polar coordinates — this is not a curiosity but a conceptual unification","Object-oriented design allows graphics components to be composed, not just selected from a catalogue","Every visual encoding involves implicit choices that a grammar makes explicit and negotiable"],decon:"ggplot2 — the dominant data visualisation package in R, used extensively in development research — implements this grammar directly. Understanding the grammar is understanding ggplot2 at its foundations."},{num:"Chapter 2",title:"How To Make a Pie",sub:"A worked example of the full grammar in action",summary:"Using the deceptively simple pie chart, Wilkinson walks through every component of the grammar: dataset, variable transforms, scale, statistics, geometry, coordinate system, and aesthetics. The pie is complex: it requires polar coordinates, a count statistic, and a categorical scale. The chapter's goal is to show that even 'simple' charts involve a chain of decisions that the grammar makes explicit.",ideas:["The recipe for a pie chart: take a bar chart, apply polar coordinates, use cumulative area","Every element of the grammar is present in every graphic — the question is what values each element takes","Notation: ELEMENT: geometry.stat(varset) | COORD: polar(theta) — this is the underlying specification language","The simplicity of pie charts is illusory; their ambiguity in encoding quantity is a consequence of using area and angle rather than length"],decon:"Development data reports rely heavily on pie charts for budget breakdowns and sector allocations. Understanding why pie charts are cognitively inferior to bar charts for reading proportions requires understanding the role of geometry and coordinate system in encoding."},{num:"Chapter 3",title:"Data",sub:"The distinction between empirical and abstract data",summary:"Data in the grammar is not a spreadsheet — it is a more abstract structure. Wilkinson distinguishes empirical data (measurements from the world), abstract data (derived structures like hierarchies or networks), and metadata (descriptions of the data structure). Variables are typed: nominal, ordinal, interval, or ratio. These distinctions determine which statistical operations and visual encodings are meaningful.",ideas:["Nominal data: categories with no order (countries, sectors); only equality comparisons are meaningful","Ordinal data: categories with order (poverty quintiles) but distances between categories are not comparable","Interval data: differences are meaningful (temperature in Celsius) but ratios are not","Ratio data: a true zero exists, ratios are meaningful (income, height, distance)"],decon:"Poverty quintiles are ordinal, not interval. Saying 'the gap between quintile 1 and 2 equals the gap between 4 and 5' requires assumption. Visualising quintile gaps with equal spacing on a linear axis imposes an interval-level assumption that the underlying ordinal data does not support."},{num:"Chapter 4",title:"Variables",sub:"Transforms — creating new variables from existing ones",summary:"Variables in the grammar are not raw columns but potentially transformed versions. Transforms include log, rank, cumulative sum, smoothing, and aggregation. The choice of transform is a statistical and visual decision: log-transforming income makes a right-skewed distribution more symmetric and makes multiplicative relationships linear.",ideas:["Log transform: converts exponential growth to linear; makes skewed income distributions symmetric","Rank transform: converts to ordinal; useful when absolute values are less meaningful than relative position","Bin transform: creates histograms by grouping continuous variables into intervals — the number of bins is itself a choice","Cumulative: creates cumulative distribution functions; useful for visualising inequality (Lorenz curve)"],decon:"The Lorenz curve — the standard tool for visualising income inequality — is a cumulative transform of income on a rank variable. The Gini coefficient is the area between the Lorenz curve and the diagonal. Both are variable transforms in Wilkinson's grammar."},{num:"Chapter 5",title:"Algebra",sub:"The notation for specifying how variables combine in a graphic",summary:"The algebra chapter defines how multiple variables combine within a graphic using three operators: cross (×), nest (/), and blend (+). Cross creates a grid of combinations; nest creates hierarchical groupings; blend overlays separate graphs. This algebraic notation makes explicit what charts leave implicit — which variables are combined in which way.",ideas:["Cross operator ×: creates Cartesian product of variable categories — used for faceting and grouped displays","Nest operator /: creates hierarchical groupings — used for stacked bars, tree maps, and hierarchical layouts","Blend operator +: overlays multiple graphics in the same frame — used for adding trend lines to scatterplots","The algebra makes chart types into instances of a more general compositional system"],decon:"Small multiples — the practice of showing the same chart for multiple subgroups of data — is a cross operation in Wilkinson's algebra. Edward Tufte called small multiples one of the most powerful tools in data visualisation; they are the standard approach for comparing districts, states, or demographic groups in development research."},{num:"Chapter 6",title:"Scales",sub:"The bridge between data space and visual space",summary:"Scales map data values to visual properties: position, colour, size, shape. Scaling theory draws on psychophysics (Stevens' power law) to understand how perceived differences in visual properties relate to differences in data values. The chapter covers linear, log, categorical, and quantile scales, and explains when each is appropriate.",ideas:["Linear scale: equal data differences map to equal visual distances — appropriate for interval and ratio data","Log scale: equal multiplicative differences map to equal visual distances — appropriate for data spanning several orders of magnitude","Quantile scale: equal proportions of data map to equal visual distances — appropriate for comparing distributions","Colour scales require special attention: hue encodes categorical data; saturation and lightness encode ordered data"],decon:"GDP per capita data spans several orders of magnitude across countries. A linear scale makes high-income countries dominate the visual range; a log scale makes relative differences comparable. Most cross-country income visualisations that use linear scales are technically misleading."},{num:"Chapter 7",title:"Statistics",sub:"The statistical transformations applied before rendering",summary:"Statistics in the grammar are functions applied to data before geometric encoding. They include: smooth (regression lines, LOESS), summary (mean, median, count), distribution (density estimate, histogram bins), and regression (linear model). Applying a smoother to a scatterplot is not decoration — it is a statistical choice with assumptions.",ideas:["Count statistic: counts observations in each category — the underlying statistic for bar charts","Density statistic: estimates a probability distribution from data — used for smooth density plots","Smooth statistic: fits a curve to data — LOESS, splines, or parametric regression","Regression statistic: fits a linear or nonlinear model — a trend line is a rendered regression statistic"],decon:"When a development report adds a 'trend line' to a time series chart, it is applying a statistics transform — either linear regression or a smoother. The choice of statistic (OLS vs LOESS vs spline) embeds assumptions about the shape of the relationship that are rarely disclosed."},{num:"Chapter 8",title:"Geometry",sub:"The visual representation of data after statistical transformation",summary:"Geometry is the visual shape used to represent data: point, line, area, bar, polygon, text, path. Each geometry has different affordances for encoding and reading data. Points are best for bivariate relationships; lines for time series; areas for cumulative quantities; bars for comparisons.",ideas:["Point geometry: each row becomes a point in 2D space; position encodes two variables; size, colour, and shape can encode additional variables","Line geometry: connects points in order; implies continuity between observations — appropriate for time series, inappropriate for unordered categories","Area geometry: fills the space under a line — emphasises cumulative values; stacked areas are hard to read because baselines shift","Bar geometry: length encodes quantity; bars should start at zero because length is being used as the encoding"],decon:"Stacked area charts are widely used in development reports for aid flows, budget allocation, and demographic change. They are hard to read because only the bottom category has a fixed baseline; all others are read against shifting baselines. Small multiples with individual area charts is usually clearer."},{num:"Chapter 9",title:"Coordinates",sub:"The space in which the graphic is rendered",summary:"Coordinates transform the rendered geometry into a visual frame. Rectangular coordinates (x, y) are standard. Polar coordinates transform bars to pie charts and lines to radar charts. Map projections place geographic data onto a 2D plane with inevitable distortions. 3D coordinates add a third dimension that usually reduces readability without adding information.",ideas:["Polar coordinates: x maps to angle, y maps to radius — transforms a stacked bar chart into a pie chart","Map projections: every projection distorts area, shape, distance, or direction — there is no undistorted flat map","Equal-area projections (e.g. Mollweide) preserve relative areas — better for choropleth maps showing rates","Mercator projection drastically exaggerates the area of high-latitude regions — Africa appears smaller than Greenland"],decon:"Choropleth maps — the standard format for showing country or district-level indicators in development reports — embed a projection choice that affects perceived importance. Regions with large physical area dominate even if their population or economic weight is small. Cartograms (area proportional to population) are more appropriate for most development outcomes."},{num:"Chapter 10",title:"Aesthetics",sub:"The visual channels that encode data beyond position",summary:"Aesthetics map data to visual properties other than position: colour, size, shape, opacity, and line type. Not all channels are equally effective at encoding quantitative vs categorical data. Position is the most accurate channel for quantitative data; colour hue is appropriate for categorical data; colour intensity (saturation, lightness) is appropriate for ordered data.",ideas:["Position is the most accurate perceptual channel — use it for the most important variable in the graphic","Colour hue: categorically distinct; cannot encode quantity — do not use rainbow colour scales for continuous data","Colour lightness/saturation: perceived as ordered; appropriate for ordered data (poverty rates, inequality scores)","Size (area): perceived non-linearly — humans underestimate the area of large circles relative to small ones"],decon:"Rainbow colour scales are standard in many GIS and development mapping tools. They are perceptually non-monotone — the middle (green) appears more distinct than the ends — which creates false visual salience at arbitrary data values. Sequential colour scales (white-to-dark blue) are more honest."},{num:"Chapter 11",title:"Facets",sub:"Small multiples — repeating a graphic across subgroups",summary:"Facets embed multiple frames within a single graphic, each showing the same visual encoding for a different subset of data. This is the most powerful device for showing variation across groups, time periods, or geographic units. The algebra of facets uses the cross and nest operators to specify which variable determines the faceting.",ideas:["Row facets: one row per category of a variable — natural for comparing over time or across demographic groups","Column facets: one column per category — natural for comparing across contexts","Grid facets: rows and columns defined by two variables — a 2D array of small multiples","Faceting requires consistent scales across panels; inconsistent scales allow comparison only within, not across, panels"],decon:"Small multiples are the standard format for showing the same health or poverty outcome across states, districts, or demographic groups in development analysis. They outperform side-by-side bars and grouped bars for displaying interaction effects between variables."},{num:"Chapters 13–15",title:"Space, Time, Uncertainty",sub:"The perceptual and graphical challenges of three fundamental data dimensions",summary:"Part 2 of the book examines specific data dimensions that pose graphical challenges. Space requires map projections that distort differently. Time requires decisions about granularity, baseline, and whether to show level or change. Uncertainty requires graphical devices (error bars, confidence bands, fan charts) that map statistical uncertainty to visual properties.",ideas:["Spatial data: all maps lie; the question is which distortions are acceptable given the claim being made","Time: showing level vs showing change (first difference) produces dramatically different visual impressions","Uncertainty: error bars should show ±1 SE, ±1.96 SE (95% CI), or full distribution — the choice must be disclosed","Fan charts for forecasts use colour intensity to show probability bands around a central projection"],decon:"IPCC and World Bank long-range projections use fan charts. Country-level poverty trend lines rarely show confidence intervals. Development outcome maps almost never show the sampling uncertainty in the underlying survey estimates — which can be very large for small sub-populations."}],b=[{layer:"Data",component:"varset",desc:"The dataset and variables to visualise",example:"aes(x=gdp_pc, y=life_expectancy, colour=region)"},{layer:"Transform",component:"transform",desc:"Transformations applied to variables before encoding",example:"scale_x_log10()  # log transform"},{layer:"Scale",component:"scale",desc:"Mapping from data values to visual properties",example:"scale_colour_viridis_d()  # colour scale"},{layer:"Statistics",component:"stat",desc:"Statistical aggregation before geometric rendering",example:"stat_smooth(method='loess')  # smoother"},{layer:"Geometry",component:"geom",desc:"The visual shape used to represent data",example:"geom_point()  # scatterplot points"},{layer:"Coordinates",component:"coord",desc:"The coordinate system for the frame",example:"coord_map('mollweide')  # equal-area projection"},{layer:"Facets",component:"facet",desc:"Small multiples across subgroups",example:"facet_wrap(~region, ncol=3)"},{layer:"Guides",component:"guide",desc:"Legends, axes, and annotation",example:"labs(title='GDP vs Life Expectancy', caption='World Bank, 2023')"}],w=[{term:"Grammar of Graphics",defn:"A framework that decomposes any graphic into seven components: data, transform, scale, statistics, geometry, coordinate system, and aesthetics. Any valid graphic is a specification across all seven layers.",note:"ggplot2 implements this grammar. Understanding the grammar explains ggplot2 syntax more completely than any tutorial."},{term:"Geometry",defn:"The visual shape used to represent data after statistical transformation: point, line, area, bar, polygon, path, text. Each geometry has different affordances for encoding and reading.",note:"Bar charts should start at zero because bar length is the encoding. Truncated y-axes misrepresent magnitude."},{term:"Aesthetic Mapping",defn:"The assignment of data variables to visual channels: position (x,y), colour, size, shape, opacity, line type. Position is the most accurate channel; colour hue is appropriate only for categorical data.",note:"Rainbow colour scales are perceptually non-monotone. Use sequential scales for ordered data and diverging scales for data with a meaningful midpoint."},{term:"Scale",defn:"The function mapping data space to visual space. Linear scale: equal differences → equal distance. Log scale: equal ratios → equal distance. Quantile scale: equal proportions → equal distance.",note:"Log scales are appropriate for GDP, income, and population data spanning multiple orders of magnitude. Linear scales on such data mislead."},{term:"Facet",defn:"Small multiples: repeating the same visual encoding for different subsets of data. Each panel shares axes and scales, enabling direct comparison.",note:"Small multiples are the most powerful device for showing how a relationship varies across groups — by region, gender, income quintile, or time period."},{term:"Statistics (Grammar)",defn:"A statistical function applied to data before rendering: count, density estimate, regression, smoother. A trend line is a rendered regression statistic.",note:"Every 'trend line' in a development report is a statistical assumption. OLS assumes linearity; LOESS does not. Neither assumption is neutral."},{term:"Coordinates",defn:"The system that maps encoded data into a visual frame. Rectangular (x,y) is standard; polar transforms bars to pies and lines to radar charts; map projections embed data in geographic space with inevitable distortions.",note:"All map projections distort area, shape, distance, or direction. Equal-area projections are more honest for showing rates and proportions."},{term:"Variable Types",defn:"Nominal (no order, equality only), Ordinal (ordered, no meaningful distances), Interval (differences meaningful, no true zero), Ratio (true zero, ratios meaningful). Visual encodings should respect variable type.",note:"Poverty quintiles are ordinal, not interval. Equal-spaced visual encoding of quintiles implies equal gaps that the data does not support."}],k=[{id:"ggplot",label:"ggplot2 User",desc:"For R users who want to understand the grammar behind ggplot2",steps:["Ch 1 — Graphics vs charts; the grammar concept","Ch 2 — How every graphic is a specification across layers","Ch 5 — Algebra: cross, nest, blend operators","Ch 8 — Geom layer: point, line, bar, area","Ch 11 — Facets: small multiples in practice","Ch 10 — Aesthetics: colour scales and perceptual accuracy"]},{id:"analyst",label:"Development Analyst",desc:"For practitioners who produce and read data visualisations in development work",steps:["Ch 1 — Why the grammar matters for how you think about graphics","Ch 3 — Data types and why they determine valid encodings","Ch 6 — Scales: when to use log, linear, quantile","Ch 9 — Maps and projections: what every choropleth distorts","Ch 13–15 — Space, time, uncertainty: the hard problems"]},{id:"researcher",label:"Visualization Researcher",desc:"For those wanting to understand the theoretical foundations of data visualisation",steps:["Ch 1–2 — Grammar foundations and complete example","Ch 3–6 — Data, variables, algebra, scales: the formal system","Ch 7–10 — Statistics, geometry, coordinates, aesthetics","Ch 11–12 — Facets and guides","Ch 13–19 — Applied dimensions: space, time, uncertainty, analysis"]}],x=[{title:"Extremely Technical",body:"The Grammar of Graphics is not a practical how-to guide. It is a formal specification written by a computer scientist. Most chapters require fluency in formal notation and familiarity with programming and statistics. It is best read alongside a working implementation like ggplot2."},{title:"Limited Treatment of Perceptual Research",body:"The book covers psychophysics in the aesthetics chapter but does not fully integrate the perceptual research literature on what graphical encodings humans can read accurately. Cleveland and McGill's empirical work on graphical perception would complement it well."},{title:"No Discussion of Narrative or Communication",body:"The grammar describes what graphics are, not what they should communicate. Questions of audience, message, and design are largely absent. The Truthful Art by Alberto Cairo addresses this dimension more directly."},{title:"Second Edition Dated",body:"Published in 2005, the book predates interactive web-based visualisation, the grammar of interactive graphics (vega-lite, etc.), and most of the current development data ecosystem. D3.js, Observable, and Vega-Lite extend the grammar for interactive contexts."}],S=[{title:"Scatterplot with log scale",code:`ggplot(gapminder, aes(x=gdpPercap, y=lifeExp, colour=continent)) +
  geom_point(alpha=0.7) +
  scale_x_log10(labels=scales::comma) +
  scale_colour_brewer(palette="Set2") +
  labs(title="Income and Life Expectancy",
       x="GDP per capita (log scale)",
       y="Life expectancy (years)")`,note:"log10 scale because GDP spans 3 orders of magnitude. Colour for categorical continent (hue). Alpha for overplotting."},{title:"Small multiples with facets",code:`ggplot(data, aes(x=year, y=poverty_rate)) +
  geom_line() +
  geom_ribbon(aes(ymin=lower_ci, ymax=upper_ci), alpha=0.2) +
  facet_wrap(~state, ncol=5) +
  scale_y_continuous(labels=scales::percent) +
  labs(title="Poverty trends by state")`,note:"facet_wrap creates small multiples. geom_ribbon shows confidence interval. Colour intensity (alpha) encodes uncertainty."},{title:"Choropleth map",code:`ggplot(india_districts) +
  geom_sf(aes(fill=stunting_rate)) +
  scale_fill_viridis_c(option="magma", direction=-1,
                       labels=scales::percent) +
  coord_sf(crs=st_crs(4326)) +
  labs(title="Child stunting rates, India",
       fill="Stunting rate")`,note:"geom_sf for spatial data. scale_fill_viridis_c: sequential scale (not rainbow). Perceptually uniform colour encoding."},{title:"Lorenz curve (inequality)",code:`data %>%
  arrange(income) %>%
  mutate(cum_pop = cumsum(weight)/sum(weight),
         cum_inc = cumsum(income*weight)/sum(income*weight)) %>%
ggplot(aes(x=cum_pop, y=cum_inc)) +
  geom_line(colour="#D4520A") +
  geom_abline(slope=1, intercept=0, linetype="dashed") +
  scale_x_continuous(labels=scales::percent) +
  scale_y_continuous(labels=scales::percent) +
