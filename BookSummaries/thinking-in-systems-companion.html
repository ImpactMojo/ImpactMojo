<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thinking in Systems — ImpactMojo Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F5F0;--card:#fff;--border:#E8E0D5;--text:#1C1C1C;--muted:#6B6560;
  --accent:#1A5276;--accent-light:#EAF2FB;--teal:#1A6B5A;--teal-light:#EBF5F2;
  --radius:8px;
}
body{background:var(--bg);font-family:'Lora','Georgia',serif;color:var(--text)}
.app{min-height:100vh;display:flex;flex-direction:column}
nav{background:#1C1C1C;display:flex;align-items:center;gap:20px;padding:0 20px;min-height:52px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand-name{font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab-btn{background:none;border:none;padding:6px 13px;font-family:Inter,sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.tab-btn:hover{color:rgba(255,255,255,.85)}
.tab-btn.active{color:#fff;background:var(--accent)}
main{flex:1;padding:32px 20px;max-width:860px;margin:0 auto;width:100%}
.h1{font-family:Inter,sans-serif;font-size:22px;font-weight:700;margin-bottom:8px}
.sub{color:var(--muted);font-size:15px;margin-bottom:24px;font-family:Inter,sans-serif;line-height:1.5}
.panel{display:none}.panel.active{display:block}

/* HERO */
.hero{background:#1C1C1C;color:#fff;border-radius:12px;padding:32px;margin-bottom:20px}
.day-badge{display:inline-block;background:var(--accent);font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:4px;margin-bottom:14px}
.hero h1{font-size:34px;font-weight:700;margin-bottom:4px}
.hero .auth{font-family:Inter,sans-serif;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px}
.hero .tagline{font-size:15px;color:rgba(255,255,255,.8);line-height:1.6;max-width:620px;margin-bottom:18px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{font-family:Inter,sans-serif;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 14px;text-align:center}
.stat-n{font-size:30px;font-weight:700;color:var(--accent);font-family:Inter,sans-serif}
.stat-l{font-family:Inter,sans-serif;font-size:12px;color:var(--muted);margin-top:4px}
.arg{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:24px}
.arg p{font-size:15px;line-height:1.75}
.arg p+p{margin-top:1rem}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.nav-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:left;cursor:pointer;transition:all .15s}
.nav-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.nav-card-label{font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.nav-card-desc{font-family:Inter,sans-serif;font-size:12px;color:var(--muted)}

/* PATHWAYS */
.pw-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.pw-btn{font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s}
.pw-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pw-desc{font-family:Inter,sans-serif;font-size:14px;color:var(--muted);padding:12px 14px;background:var(--accent-light);border-radius:6px;margin-bottom:20px;line-height:1.5}
.pw-steps{display:flex;flex-direction:column;gap:10px}
.pw-step{display:flex;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.step-n{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-family:Inter,sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-family:Inter,sans-serif;font-size:14px;font-weight:700;margin-bottom:3px}
.step-focus{font-family:Inter,sans-serif;font-size:13px;color:var(--muted);line-height:1.5}

/* SECTIONS */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.sec-header{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;cursor:pointer;background:none;border:none;text-align:left;width:100%}
.sec-num{font-family:Inter,sans-serif;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;min-width:24px;padding-top:2px}
.sec-title{font-family:Inter,sans-serif;font-size:15px;font-weight:700;margin-bottom:2px}
.sec-sub{font-family:Inter,sans-serif;font-size:12px;color:var(--muted)}
.sec-chev{font-size:16px;color:var(--muted);padding-top:2px;margin-left:auto}
.sec-body{padding:0 18px 18px 56px;border-top:1px solid var(--border)}
.sec-summary{font-size:15px;line-height:1.75;padding-top:14px;margin-bottom:18px}
.ideas-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.idea-item{display:flex;gap:8px;margin-bottom:7px;font-family:Inter,sans-serif;font-size:13px;line-height:1.55}
.idea-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
blockquote{font-style:italic;font-size:14px;color:var(--muted);border-left:3px solid var(--accent);padding-left:12px;margin-bottom:8px;line-height:1.6}
.dev-toggle{font-family:Inter,sans-serif;font-size:12px;font-weight:600;color:var(--teal);background:var(--teal-light);border:none;padding:7px 12px;border-radius:4px;cursor:pointer;margin-top:10px}
.dev-text{margin-top:10px;font-family:Inter,sans-serif;font-size:13px;line-height:1.65;background:var(--teal-light);padding:12px;border-radius:6px}

/* CONCEPTS */
.concept-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.concept-card:hover,.concept-card.open{border-color:var(--accent)}
.concept-term{font-family:Inter,sans-serif;font-size:15px;font-weight:700}
.concept-def{font-family:Inter,sans-serif;font-size:14px;line-height:1.7;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prac-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-top:10px;margin-bottom:4px}
.prac-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65;color:var(--muted)}

/* TOOLKIT */
.tool-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tool-btn{font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s}
.tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px}
.tool-panel.active{display:block}
.tool-intro{font-family:Inter,sans-serif;font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.fld-label{font-family:Inter,sans-serif;font-size:13px;font-weight:600;margin-bottom:5px;display:block}
.fld{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;outline:none;background:var(--bg);margin-bottom:12px}
.fld:focus{border-color:var(--accent)}
.output-box{background:var(--accent-light);padding:14px;border-radius:6px;margin-top:16px;font-family:Inter,sans-serif;font-size:14px;line-height:1.65}
.output-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px}

/* CONTEXT */
.conn-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px;padding:16px 18px;margin-bottom:10px}
.conn-book{font-family:Inter,sans-serif;font-size:14px;font-weight:700;margin-bottom:5px}
.conn-text{font-family:Inter,sans-serif;font-size:13px;color:var(--muted);line-height:1.65}
.crit-item{display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.crit-n{width:24px;height:24px;border-radius:50%;background:#FFF8E6;color:#C8910A;font-family:Inter,sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crit-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65}
.context-h{font-family:Inter,sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;margin-top:6px}

/* ASK */
.ask-setup{}
.setup-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.setup-step{display:flex;gap:12px;font-family:Inter,sans-serif;font-size:14px;line-height:1.5}
.setup-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.setup-step a{color:var(--accent)}
.key-row{display:flex;gap:10px}
.key-input{flex:1;max-width:400px;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;outline:none}
.key-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:Inter,sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.key-btn:disabled{opacity:.4;cursor:not-allowed}
.ask-ui{display:flex;flex-direction:column;height:calc(100vh - 180px)}
.ask-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ask-hdr-title{font-family:Inter,sans-serif;font-size:18px;font-weight:700}
.ask-reset{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:Inter,sans-serif;font-size:12px;color:var(--muted);cursor:pointer}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px;margin-bottom:10px}
.suggested-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.sug-btn{display:block;width:100%;text-align:left;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.sug-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.msg{max-width:85%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65;padding:10px 14px;border-radius:8px;white-space:pre-wrap}
.msg.user .msg-text{background:var(--accent);color:#fff}
.msg.assistant .msg-text{background:var(--card);border:1px solid var(--border)}
.typing{display:flex;gap:4px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ask-input-row{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:10px}
.ask-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;resize:none;outline:none;background:var(--bg)}
.ask-input:focus{border-color:var(--accent)}
.ask-send{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:Inter,sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.ask-send:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr)}.nav-grid{grid-template-columns:1fr 1fr}.sec-body{padding-left:18px}}
</style>
</head>
<body>
<div class="app">
<nav>
  <div class="brand"><div class="dot"></div><span class="brand-name">ImpactMojo</span></div>
  <div class="tabs" id="tabbar"></div>
</nav>
<main id="main-content">
  <div class="panel active" id="p-overview"></div>
  <div class="panel" id="p-pathways"></div>
  <div class="panel" id="p-sections"></div>
  <div class="panel" id="p-concepts"></div>
  <div class="panel" id="p-toolkit"></div>
  <div class="panel" id="p-context"></div>
  <div class="panel" id="p-ask"></div>
</main>
</div>

e measurable quantities that change over time (inventory, p..."}, {"section": "System Behaviours and Archetypes", "focus": "Common system failure modes: the tragedy of the commons (shared resources eroded because individual benefit from use exceeds individual cost of depletion), the drift to low performance (standards decl..."}, {"section": "System Characteristics: Resilience, Self-Organisation, Hierarchy", "focus": "Resilient systems can recover from disruption — they have multiple feedback loops, so when one fails, others compensate. We sacrifice resilience for productivity and stability constantly: growth hormo..."}, {"section": "Thinking Gaps and Leverage Points", "focus": "Systems thinking reveals the gaps between how we think and how systems actually work: we assume linear relationships when most are non-linear; we draw boundaries that ignore important connections; we ..."}]}, {"label": "Development Researcher", "desc": "Research practice, evidence, and academic work.", "steps": [{"section": "Systems Concepts: Stocks, Flows, Feedback", "focus": "A system is a set of elements organised to achieve a goal — everything from a thermostat to a national economy to an ecosystem. Stocks are the measurable quantities that change over time (inventory, p..."}, {"section": "System Behaviours and Archetypes", "focus": "Common system failure modes: the tragedy of the commons (shared resources eroded because individual benefit from use exceeds individual cost of depletion), the drift to low performance (standards decl..."}, {"section": "System Characteristics: Resilience, Self-Organisation, Hierarchy", "focus": "Resilient systems can recover from disruption — they have multiple feedback loops, so when one fails, others compensate. We sacrifice resilience for productivity and stability constantly: growth hormo..."}, {"section": "Thinking Gaps and Leverage Points", "focus": "Systems thinking reveals the gaps between how we think and how systems actually work: we assume linear relationships when most are non-linear; we draw boundaries that ignore important connections; we ..."}]}, {"label": "Personal Growth", "desc": "Personal and professional application.", "steps": [{"section": "Systems Concepts: Stocks, Flows, Feedback", "focus": "A system is a set of elements organised to achieve a goal — everything from a thermostat to a national economy to an ecosystem. Stocks are the measurable quantities that change over time (inventory, p..."}, {"section": "System Behaviours and Archetypes", "focus": "Common system failure modes: the tragedy of the commons (shared resources eroded because individual benefit from use exceeds individual cost of depletion), the drift to low performance (standards decl..."}, {"section": "System Characteristics: Resilience, Self-Organisation, Hierarchy", "focus": "Resilient systems can recover from disruption — they have multiple feedback loops, so when one fails, others compensate. We sacrifice resilience for productivity and stability constantly: growth hormo..."}, {"section": "Thinking Gaps and Leverage Points", "focus": "Systems thinking reveals the gaps between how we think and how systems actually work: we assume linear relationships when most are non-linear; we draw boundaries that ignore important connections; we ..."}]}], "sections": [{"title": "Systems Concepts: Stocks, Flows, Feedback", "subtitle": "The basic vocabulary of complex systems", "summary": "A system is a set of elements organised to achieve a goal — everything from a thermostat to a national economy to an ecosystem. Stocks are the measurable quantities that change over time (inventory, population, trust, skills). Flows are the rates that change stocks (production, birth rates, learning). Feedback loops form when a change in a stock affects the flows that control it. Balancing loops are goal-seeking: they push a stock toward a target state (a thermostat maintains room temperature). Reinforcing loops amplify whatever is happening: they produce virtuous cycles (skills → better work → more skills) or vicious cycles (poverty → worse health → poverty). The most common analytical error is treating complex outcomes as simple cause-effect chains rather than as products of interlocking feedback structures.", "ideas": ["Stocks change only at the rate that flows allow — you cannot change a stock instantly, only the flows that affect it.", "System behaviour is determined primarily by structure (feedback loops), not by events (shocks or actions).", "A single stock with two feedback loops produces much more complex behaviour than either loop alone.", "Delays in feedback loops produce oscillation: the system overshoots and undershoots its target because the information arrives too late to calibrate the response."], "quotes": ["\"The behavior of a system cannot be known just by knowing the elements of which the system is made.\"", "\"Systems happen all at once. They are interconnected not just in one direction, but in many directions simultaneously.\""], "devEcon": "The feedback loop framework is one of the most powerful analytical tools available to development economists and practitioners. Poverty traps are reinforcing feedback loops (low assets → low productivity → low savings → low assets). Institutional persistence (Acemoglu, Robinson) is a balancing loop maintaining an equilibrium that resists external disruption. The most important development policy question — why do well-designed interventions fail to sustain change? — is almost always a feedback structure question."}, {"title": "System Behaviours and Archetypes", "subtitle": "Traps, patterns, and why systems resist change", "summary": "Common system failure modes: the tragedy of the commons (shared resources eroded because individual benefit from use exceeds individual cost of depletion), the drift to low performance (standards decline gradually as people adjust expectations to declining outcomes), escalation (competing parties' reinforcing loops of one-upmanship spiral into mutual destruction), winning by outcompeting (reinforcing loops that widen winner-loser gaps), and addiction (solutions that provide relief from symptoms without addressing root causes, progressively reducing the system's own problem-solving capacity). Each trap has structural remedies: the commons requires either privatisation of the resource or regulated access; drift requires standards anchored to historical performance; escalation requires one party unilaterally reducing its stock.", "ideas": ["The tragedy of the commons arises when individual incentives diverge from collective welfare — a structural problem, not a character problem.", "Drift to low performance is insidious: the standard declines gradually alongside performance, so the gap always looks acceptable.", "Addiction to interventions progressively reduces the system's own capacity to address problems.", "Policy resistance occurs when subsystems have conflicting goals — the policy that works against one goal activates the subsystem defending the other."], "quotes": ["\"The tragedy of the commons arises from missing (or too long delayed) feedback from the resource to the growth of the users of that resource.\"", "\"Addiction is finding a quick and dirty solution to the symptom of the problem, which prevents or distracts from the harder and longer-term task of solving the real problem.\""], "devEcon": "Development interventions routinely create addiction dynamics. Food aid that substitutes for local food market development, health programme inputs that reduce government investment in health systems, and NGO service delivery that crowds out state provision all produce the classic addiction pattern: short-term relief with long-term capacity reduction. Sustainable development — building rather than substituting for local system capacity — is the structural remedy for the addiction archetype."}, {"title": "System Characteristics: Resilience, Self-Organisation, Hierarchy", "subtitle": "What makes systems survive and thrive", "summary": "Resilient systems can recover from disruption — they have multiple feedback loops, so when one fails, others compensate. We sacrifice resilience for productivity and stability constantly: growth hormones increase a cow's milk production but reduce its immune resilience; pesticides increase crop yield but destroy the ecosystem's self-regulating capacity. Self-organisation is the highest form of resilience: the ability to learn, evolve, and create new structures to address new challenges. Hierarchy is necessary for complex systems to function without overwhelming information loads — sub-systems managing themselves while serving the larger system. Suboptimisation occurs when sub-system goals override the whole system's goals.", "ideas": ["Resilience is invisible until it is absent — systems appear maximally productive just before they collapse.", "Sacrificing resilience for efficiency is the most common systemic error in both organisations and ecosystems.", "Self-organisation requires freedom to experiment, fail, and adapt — it cannot be mandated.", "Hierarchy is not oppression but information management: it reduces the complexity any single node must process."], "quotes": ["\"Systems need to be managed not only for productivity or stability, they also need to be managed for resilience.\"", "\"The ability to self-organize is the strongest form of system resilience. A system that can evolve can survive almost any change, by changing itself.\""], "devEcon": "Development programme design that builds resilience — adaptive capacity, multiple feedback mechanisms, local problem-solving capacity — rather than only optimising for short-term output metrics is the systems thinking equivalent of Meadows's resilience principle. PDIA is explicitly a self-organisation framework: it provides structure within which local actors can evolve their own solutions. The most common failure in development is building efficient delivery systems that lack resilience when conditions change."}, {"title": "Thinking Gaps and Leverage Points", "subtitle": "Where to intervene for lasting change", "summary": "Systems thinking reveals the gaps between how we think and how systems actually work: we assume linear relationships when most are non-linear; we draw boundaries that ignore important connections; we attribute system behaviour to single causes when it is always multi-causal; we underestimate delays. The most important analytical tools: time-lapse perspective (watch behaviour over long time periods, not just recent events), scenario analysis (what would happen if different driving factors evolved differently?), and leverage point identification. Leverage points, ranked from lowest to highest impact: numbers (usually ineffective), stocks and flows (structural but difficult to change), feedback loop strength, feedback loop information structure, rules, self-organisation capacity, goals, paradigms, and — the highest — the ability to transcend paradigms.", "ideas": ["The lowest leverage interventions are the ones most commonly attempted: adjusting numbers (tax rates, subsidies, program budgets).", "The highest leverage interventions challenge paradigms — the shared beliefs and assumptions that define what a system is for.", "All system boundaries are imaginary: drawing them in the wrong place misses the most important causal connections.", "Bounded rationality: we all make good decisions within the information we can see, but no one can see the whole system."], "quotes": ["\"Structure is the key to understanding not just what is happening, but why.\"", "\"The future can't be predicted, but it can be envisioned and brought lovingly into being.\"", "\"If no paradigm is right, you can choose whatever one will help to achieve your purpose.\""], "devEcon": "The leverage point hierarchy is one of the most important analytical tools for development policy. Adjusting numbers (transfer amounts, subsidy rates, budget allocations) — the lowest leverage intervention — is what most development policy consists of. Challenging paradigms (the assumptions about what causes poverty, what effective institutions look like, how markets work) — the highest leverage intervention — is what produces transformative change. The most durable development successes involve paradigm shifts: from 'aid transfers' to 'cash and markets', from 'training delivery' to 'capability building', from 'project implementation' to 'adaptive management'."}], "concepts": [{"term": "Stocks", "definition": "The measurable accumulated quantities in a system that change over time — inventory, population, trust, skills, savings, forest cover. Stocks change only at the rate that flows allow; they cannot be changed instantaneously.", "practitionerNote": "In development programmes, the stocks that matter are often slow-moving and invisible: community trust, household asset levels, institutional capacity, social cohesion. Measuring only fast-moving output indicators misses the most important dynamics."}, {"term": "Feedback Loops", "definition": "Causal circuits in which a change in a stock affects the flows that change it. Balancing loops are goal-seeking (push toward a target state). Reinforcing loops amplify whatever is happening (produce exponential growth or collapse). All complex behaviour emerges from feedback loop interactions.", "practitionerNote": "Understanding whether a programme is trying to create a new reinforcing loop, strengthen a balancing loop, or break an existing reinforcing loop is the most important systems diagnosis in development programme design. Most programmes are designed without this analysis."}, {"term": "Tragedy of the Commons", "definition": "A feedback structure in which individuals benefit directly from using a shared resource but share the costs of its depletion. Produces overuse and eventual collapse of common resources. Structural solutions: privatisation, regulated access, or community-enforced quotas.", "practitionerNote": "Overuse of shared natural resources (fisheries, groundwater, forests) in development contexts is almost always a tragedy of the commons, not a moral failure. Structural solutions (community management systems, regulated access) work; exhortation and information campaigns without structural change do not."}, {"term": "Addiction (System Archetype)", "definition": "A pattern in which a relief-providing intervention becomes a substitute for addressing the root cause, progressively eroding the system's own problem-solving capacity and increasing dependence on the intervention.", "practitionerNote": "Food aid, humanitarian cash, and NGO service delivery can all produce addiction dynamics when they substitute for rather than build local capacity. The test: is this intervention building or substituting for the system's own problem-solving capacity?"}, {"term": "Leverage Points", "definition": "Meadows's hierarchy of points in a system where interventions produce disproportionate change. Ranked from lowest (numbers) to highest (paradigms). The most commonly attempted interventions (adjusting budgets and prices) are the lowest leverage; the most transformative interventions (challenging shared assumptions about what a system is for) are the highest.", "practitionerNote": "Most development policy operates at the lowest leverage levels (adjusting transfer amounts, changing subsidy structures). The most durable development changes involve paradigm shifts — changes in shared beliefs about what causes poverty and what effective institutions look like. Identifying the paradigm level intervention for a given problem is the most important systems thinking exercise for development policy."}], "tools": [{"label": "Reflection Journal", "intro": "Use these prompts to connect the book to your practice.", "html": "<label class=\"fld-label\">What is the most important idea in this book for your current work?</label>\n<textarea class=\"fld\" id=\"r1\" rows=\"3\" placeholder=\"Your reflection...\"></textarea>\n<label class=\"fld-label\">Where does this book's argument apply to a specific challenge you face?</label>\n<textarea class=\"fld\" id=\"r2\" rows=\"3\" placeholder=\"Your reflection...\"></textarea>\n<label class=\"fld-label\">One concrete change you will make this week based on reading this:</label>\n<textarea class=\"fld\" id=\"r3\" rows=\"3\" placeholder=\"Your reflection...\"></textarea>\n<div style=\"margin-top:12px;font-family:Inter,sans-serif;font-size:13px;color:var(--muted)\">Reflections stay in your browser only.</div>"}], "connections": [{"book": "Thinking, Fast and Slow — Kahneman", "text": "Kahneman's bounded rationality (System 1's cognitive shortcuts) is the individual-level mechanism that produces the bounded rationality Meadows describes at the system level. We each make locally rational decisions that produce globally irrational system behaviour because no individual can see the whole system. The two books are the micro and macro levels of the same insight."}, {"book": "Influence — Cialdini", "text": "Cialdini's fixed-action patterns are the feedback loops of social behaviour — automatic responses triggered by specific cues that produce predictable outcomes. Meadows's systems thinking provides the structural framework for understanding why Cialdini's principles work: they are balancing loops maintaining social equilibrium."}, {"book": "Grit — Duckworth", "text": "Duckworth's deliberate practice loop (stretch goal → focused attention → feedback → next stretch goal) is a reinforcing feedback loop: each cycle raises skill level, which changes what the next stretch goal looks like. The virtuous cycle of skill development is a self-organising system that Meadows's framework describes precisely."}], "critiques": ["Meadows's framework is primarily analytical — it explains why things are the way they are more clearly than it prescribes what to do about them. The leverage point hierarchy is intuitive but the practical challenge of actually shifting paradigms is not addressed in the detail the concept deserves.", "Systems thinking has been criticised for a conservatism bias: by emphasising feedback structures and equilibria, it can inadvertently suggest that existing systems are hard-wired and resistant to change. The revolutionary changes in social systems (abolition, democratisation, market transitions) that were not predicted by systems models are underdiscussed.", "The book's policy examples are dated (1990s-era issues) and its most important section (leverage points) is the shortest and least developed. Practitioners seeking practical guidance for applying systems thinking to specific development problems will need to supplement with more recent work (e.g., Sterman 2001, Senge 1990)."], "suggested": ["How do reinforcing and balancing feedback loops explain poverty trap dynamics?", "What is the tragedy of the commons and how does it apply to natural resource management in development?", "How does Meadows's addiction archetype explain why food aid sometimes makes food insecurity worse?", "What are the highest-leverage points for development policy intervention according to Meadows?", "How does PDIA relate to Meadows's concept of self-organisation?"], "systemPrompt": "You are an expert reading companion for 'Thinking in Systems' by Donella H. Meadows. Your audience is development economists, practitioners, and ImpactMojo learners. Answer questions about feedback loops, system archetypes, leverage points, and the application of systems thinking to development economics, programme design, and policy. Reference poverty trap models, PDIA, and adaptive management where relevant."};

// Tab management
const TABS = [
  {id:"overview",label:"Overview"},
  {id:"pathways",label:"Pathways"},
  {id:"sections",label:"Sections"},

];

const tabbar = document.getElementById("tabbar");
TABS.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (t.id === "overview" ? " active" : "");
  btn.textContent = t.label;
  btn.onclick = () => switchTab(t.id);
  tabbar.appendChild(btn);
});

function switchTab(id) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("p-" + id).classList.add("active");
  tabbar.querySelectorAll(".tab-btn")[TABS.findIndex(t=>t.id===id)].classList.add("active");
}

// ASK
(function() {
  const el = document.getElementById("p-ask");
  let apiKey = "", msgs = [], loading = false;
  
  function renderSetup() {
    el.innerHTML = `
      <div class="ask-setup">
        <div class="h1">Ask the Book</div>
        <div class="sub">AI-powered Q&A using Gemini 2.0 Flash (free). Requires a Google AI Studio API key.</div>
        <div class="setup-steps">
          <div class="setup-step"><span class="setup-num">1</span><span>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> and create a free API key.</span></div>
          <div class="setup-step"><span class="setup-num">2</span><span>Paste it below. The key stays in your browser only and is never stored.</span></div>
        </div>
        <div class="key-row">
          <input class="key-input" type="password" id="key-in" placeholder="AIza..." oninput="document.getElementById('key-submit').disabled=!this.value.trim()"/>
          <button class="key-btn" id="key-submit" disabled onclick="__setKey()">Connect</button>
        </div>
      </div>
    `;
  }
  
  function renderChat() {
    el.innerHTML = `
      <div class="ask-ui">
        <div class="ask-hdr"><span class="ask-hdr-title">Ask the Book</span><button class="ask-reset" onclick="__resetKey()">Change key</button></div>
        <div class="msgs" id="msgs-box">
          ${msgs.length===0?`<div><div class="suggested-label">Suggested questions</div>${DATA.suggested.map(q=>`<button class="sug-btn" onclick="__ask('${q.replace(/'/g,"\'")}')">${q}</button>`).join("")}</div>`:""}
          ${msgs.map(m=>`<div class="msg ${m.role}"><div class="msg-text">${m.content}</div></div>`).join("")}
          ${loading?`<div class="msg assistant"><div class="typing"><span></span><span></span><span></span></div></div>`:""}
        </div>
        <div class="ask-input-row">
          <textarea class="ask-input" id="ask-in" rows="2" placeholder="Ask about the book..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();__sendAsk()}"></textarea>
          <button class="ask-send" id="ask-send" onclick="__sendAsk()">Send</button>
        </div>
      </div>
    `;
    const box = document.getElementById("msgs-box");
    if(box) box.scrollTop = box.scrollHeight;
  }
  
  window.__setKey = () => {
    const v = document.getElementById("key-in").value.trim();
    if(v) { apiKey = v; renderChat(); }
  };
  window.__resetKey = () => { apiKey=""; msgs=[]; renderSetup(); };
  window.__ask = (q) => {
    document.getElementById("ask-in").value = q;
    __sendAsk();
  };
  window.__sendAsk = async () => {
    const inp = document.getElementById("ask-in");
    if(!inp) return;
    const q = inp.value.trim();
    if(!q || loading) return;
    inp.value = "";
    msgs.push({role:"user",content:q});
    loading = true; renderChat();
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          system_instruction:{parts:[{text:DATA.systemPrompt}]},
          contents: msgs.map(m=>{return{role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}}).slice(0,-1).concat([{role:"user",parts:[{text:q}]}]),
          generationConfig:{maxOutputTokens:1200,temperature:0.3}
        })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error?.message||"API error");
      const reply = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"No response.";
      msgs.push({role:"assistant",content:reply});
    } catch(e) {
      msgs.push({role:"assistant",content:"Error: "+e.message});
    }
    loading = false; renderChat();
  };
  
  renderSetup();
})();
</script>
