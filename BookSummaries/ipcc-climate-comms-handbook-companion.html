CONTEXT: IPCC scientists are trusted by the public but often communicate ineffectively. The handbook helps them use evidence-based communication techniques. While written for IPCC scientists, the principles apply broadly to any expert communicator on climate change.

SIX PRINCIPLES:

PRINCIPLE 1 \u{2014} BE A CONFIDENT COMMUNICATOR:
Scientists are generally well-trusted by the public. Credibility comes from both expertise and authentic personal voice. There is no single 'correct' role for a scientist communicator \u{2014} some communicate purely as scientists, others share personal values alongside science (Stephen Schneider's 'double ethical bind'). Key: be clear whether you are speaking as an IPCC author (policy-neutral) or as an independent expert. Widespread public concern about climate change exists \u{2014} 70%+ support for renewables in major European countries. No need to assume hostile audiences.

PRINCIPLE 2 \u{2014} TALK ABOUT THE REAL WORLD, NOT ABSTRACT IDEAS:
Global temperature targets and ppm CO2 concentrations don't relate to people's daily lives. Abstract metrics trigger psychological distancing \u{2014} treating climate as a distant problem. Use framing (language that positions information in a relatable way). Key frames that work across audiences:
- Avoiding wastefulness (resonates particularly with conservative audiences for energy efficiency)
- Health benefits (cleaner air, cycling, walking \u{2014} positive across political spectrum)
- Balance (speaks to centre-right values; also metaphorically useful \u{2014} natural world 'out of balance')
Metaphors and analogies: 'Loaded dice' (climate loads the weather dice toward extreme events); 'Heat trapping blanket' (greenhouse effect \u{2014} tested effectively); 'Bathtub' filling with CO2 (even if we turn off the tap, existing CO2 stays \u{2014} introduces negative emissions).

PRINCIPLE 3 \u{2014} CONNECT WITH WHAT MATTERS TO YOUR AUDIENCE:
Values and political ideology predict climate attitudes more strongly than scientific knowledge levels. People filter information through their values \u{2014} conservative audiences may reject conclusions perceived as threatening values like economic freedom or national sovereignty. Facts are necessary but not sufficient. Find common ground with audience values before presenting science. Key values research (Cardiff University, UK): reducing waste/efficiency, environmental protection/naturalness, secure and affordable energy, autonomy and choice, fairness and transparency. Connect with local points of interest \u{2014} amateur gardeners (growing seasons), farmers (weather, yields), faith groups (stewardship). Practical steps: (1) Research the place; (2) Partner with local group; (3) Ask the audience what they love that is affected by climate change.

PRINCIPLE 4 \u{2014} TELL A HUMAN STORY:
IPCC has historically been perceived as dry and bureaucratic \u{2014} absence of human faces. Personal stories of scientists (who they are, why they care) are valuable communication resources. 'More than Scientists' project: scientists share relationship between professional and personal lives (Katharine Hayhoe on evangelical faith and climate). Narrative structure (description \u{2192} consequences \u{2192} solutions) is more engaging and memorable than facts and graphs. ABT template (And/But/Therefore): And = exposition; But = conflict; Therefore = resolution. Example: "As a parent I've always shared childhood experiences with my sons [And] and felt connection to future generations. But as I've raised them I've seen disrupted seasons and felt this as a challenge to my sense of what it means to be a good father. Therefore I made the decision to return to university and study the social science of climate change." Solutions must be included \u{2014} without solutions, climate communication creates overwhelming anxiety without agency.

PRINCIPLE 5 \u{2014} LEAD WITH WHAT YOU KNOW:
Scientific literacy is low; many people view science as binary (facts vs uncertainty). Focusing on uncertainty first gives the impression of scientific disagreement. Focus on knowns before unknowns. The level of scientific consensus (97%+ of publishing climate scientists) on human causation is a 'gateway belief' \u{2014} once people accept consensus, other climate attitudes tend to follow. Extreme weather: scientists increasingly able to quantify climate attribution. Key guidance on extreme weather communication:
- Communicate growing confidence in attribution (not 'no single event is caused by climate change')
- Public increasingly understands weather-climate links
- Discuss links before (not during/after) extreme events to avoid appearing opportunistic
- Understand audience values when framing extreme weather discussions

PRINCIPLE 6 \u{2014} USE THE MOST EFFECTIVE VISUAL COMMUNICATION:
Photographic images: narrow visual vocabulary (polar bears, smokestacks, protesters) fails to engage. Climate Visuals project (research in UK, Germany, US) produced evidence-based principles:
1. Show real people not staged photo-ops \u{2014} authentic emotion is powerful
2. Tell new stories \u{2014} familiar 'classic' images prompt fatigue; less familiar images provoke thought
3. Couple impact images with action \u{2014} overwhelming impact images without action prompt despair
4. Show local climate impacts with identifiable people and emotions \u{2014} most powerful
5. Images of solutions generate positive emotions across political spectrum
Data visuals: MADE framework \u{2014} Message (identify key takeaway), Audience (assess prior knowledge), Design (use formats audience knows), Evaluation (test on target audience). Data visuals often difficult for non-experts; 12 evidence-based principles developed for IPCC scientists.`,c=["Overview","Principles","From Theory to Practice","Quick Reference","Ask"],f=[{num:1,title:"Be a Confident Communicator",colour:"#1d4ed8",headline:"Scientists are generally highly trusted. An authentic voice lets you communicate effectively with any audience.",what:"Credibility comes from two sources: scientific expertise and authentic personal voice. These are independent — you can have expertise without authenticity, and warmth without authority, but the most effective science communicators bring both. As an IPCC author you must distinguish between speaking in an official IPCC capacity (policy-neutral, balanced) versus speaking as an independent expert (where you can share personal views).",practice:["Be clear with your audience whether you are speaking as an IPCC author or as an expert in your own right","Know that public concern about climate change is widespread — no need to assume hostile audiences","Use authentic personal voice alongside your scientific expertise","Acknowledge uncertainty in scientific findings while maintaining confidence in well-established consensus"],evidence:"Ipsos Mori Veracity Index consistently ranks scientists among the most trusted professions. Research by NASEM (2017) confirms that trust is driven both by expertise and by the authenticity of the communicator's voice.",pitfall:"Assuming audiences are hostile or dismissive. Research shows that in most countries, majorities accept climate change is real and human-caused, and support policy responses."},{num:2,title:"Talk About the Real World, Not Abstract Ideas",colour:"#7c3aed",headline:"Global temperature targets and CO₂ concentrations don't relate to people's daily lives. Start on common ground.",what:"Abstract global metrics such as '2°C' and '400 ppm CO₂' trigger psychological distancing — the cognitive process by which people treat problems as distant in time, place, and personal relevance. 'Framing' means using language to position information in a particular light. All communication is already framed; the question is whether the frame was chosen deliberately and effectively.",practice:["Lead with locally relevant impacts and concerns, not global statistics","Use frames that match your audience's values (wasteful/efficient, healthy/harmful, balanced/out of balance)","Use tested metaphors: loaded dice, heat-trapping blanket, bathtub filling with CO₂","Avoid '2 degrees' or 'ppm' as entry points for non-specialist audiences"],evidence:"Research by Shaw (2016) demonstrates that global temperature targets are poorly understood and can trigger unexpected responses — in some regions, modest warming is welcomed. The 'bathtub' metaphor (Guy et al., 2013) has been shown to increase comprehension of carbon accumulation and support for policy action.",pitfall:"Starting with 'the science says' framing before connecting to audience values. This positions science as something external to the audience's life rather than relevant to it."},{num:3,title:"Connect with What Matters to Your Audience",colour:"#047857",headline:"Values and political views predict climate attitudes more strongly than knowledge. Find common ground first.",what:"People 'filter' information according to whether it fits their existing values and worldview — a phenomenon known as motivated reasoning. This is not irrationality; it is a universal feature of human cognition. In some English-speaking nations it has produced political polarisation on climate change, where accepting the scientific consensus is perceived as threatening values associated with economic freedom or national sovereignty.",practice:["Research the audience's likely values and interests before speaking","Connect with widely shared values (efficiency, health, security, fairness) rather than leading with the science","Find a local fact or story relevant to the audience — then use it as an entry point","Ask the audience: what do you love or care about that climate change threatens?"],evidence:"Kahan et al. (2012) found that scientific literacy and numeracy increase political polarisation on climate risk rather than reducing it — the more numerate the person, the better they are at rationalising the position that fits their values. Corner et al. (2014) document that human values are central to public engagement with climate change.",pitfall:"Presenting scientifically accurate information without connecting to audience values. Accuracy is necessary but not sufficient for changing minds or motivating action."},{num:4,title:"Tell a Human Story",colour:"#b45309",headline:"Most people understand the world through stories and anecdotes, not statistics and graphs.",what:"The IPCC has historically been perceived as dry and bureaucratic. The personal stories of scientists — who they are, why they do the work, what they care about — are an underused communication resource. Narrative structure (problem → consequence → solution) is more engaging, memorable, and emotionally resonant than lists of facts. The ABT template (And/But/Therefore) provides a practical structure for turning any message into a story.",practice:["Share something personal about yourself outside your work as a scientist","Use the ABT narrative template: And (exposition) → But (conflict) → Therefore (resolution)","Always include solutions — without them, climate communication creates anxiety without agency","Describe consequences and solutions as well as the problem"],evidence:"Research summarised by NASEM (2017) confirms that narrative formats help public audiences understand complex science, make it easier to remember, and are more emotionally resonant than traditional scientific communication formats (lists, graphs, statistics).",pitfall:"Omitting solutions. Research consistently shows that presenting climate problems without viable solutions overwhelms audiences and produces hopelessness rather than motivation to act."},{num:5,title:"Lead with What You Know",colour:"#b91c1c",headline:"Uncertainty is a feature of good science — but leading with it gives the impression of disagreement where there is consensus.",what:"Most adults view science as a set of binary facts. When scientists lead with uncertainty (what we don't know), audiences interpret this as general scientific disagreement — including on well-established basics. The 97%+ scientific consensus on human causation of climate change is a 'gateway belief': once audiences accept the consensus, other climate-related beliefs tend to follow. On extreme weather: scientists can increasingly quantify climate attribution; this should be communicated, not avoided.",practice:["Focus on what is known before discussing uncertainties","Incorporate the level of scientific consensus explicitly ('nearly all climate scientists agree')","On extreme weather, communicate growing attribution confidence (not 'no single event can be attributed to climate change')","Discuss extreme weather links before events occur to avoid appearing opportunistic"],evidence:"van der Linden et al. (meta-analysis) found that presenting the 97% consensus figure shifted people's beliefs about the level of scientific agreement, which in turn influenced their policy views. This 'gateway belief' effect was replicated across multiple studies.",pitfall:"Using 'no single weather event can be caused by climate change' as a standard response. Research shows this confuses the public about the state of climate science, since attribution science has advanced significantly since this framing was developed."},{num:6,title:"Use the Most Effective Visual Communication",colour:"#0f766e",headline:"Choosing images and graphs is just as important to do evidence-based as verbal communication.",what:"A narrow visual vocabulary currently frames climate change: polar bears, melting ice, smokestacks, protesters. These images are so familiar they prompt fatigue rather than engagement. The Climate Visuals project (research across UK, Germany, US) developed an evidence-based image library and five principles. For data visuals, the MADE framework (Message, Audience, Design, Evaluation) provides guidance for making scientific charts accessible.",practice:["Show real people with identifiable emotions, not staged photo-ops","Tell new visual stories — avoid familiar 'classic' images that prompt cynicism","Couple impact images with concrete actions audiences can take","Show local climate impacts with people and emotions — most emotionally powerful","Test data visuals on representative members of your target audience"],evidence:"Climate Visuals research (UK, Germany, US) shows that images of people affected by climate change, particularly at local scale with visible emotion, produce stronger engagement than global-scale abstract imagery. Images depicting solutions generated positive emotions across the political spectrum.",pitfall:"Using the 'polar bear on ice' as a default climate image. Research shows it has become so familiar it is now a cause of audience disengagement, and is visually distant from most people's lived experience."}],d=[{principle:"Talk About the Real World",tool:"Framing Toolkit",example:"Wasteful/Efficient Frame",detail:"'Installing home insulation is about avoiding waste and cutting energy bills' — this framing tests well across political spectrums, particularly with conservative audiences. The frame connects the action (energy efficiency) to a broadly shared value (not wasting money and resources) without requiring agreement on climate science."},{principle:"Talk About the Real World",tool:"Metaphors",example:"Heat Trapping Blanket",detail:"'Greenhouse gases act like a heat-trapping blanket around the Earth. More fossil fuel emissions make the blanket thicker, raising the planet's temperature.' Tested as an effective metaphor for communicating the greenhouse effect to general audiences. Simple, visual, accurate."},{principle:"Talk About the Real World",tool:"Metaphors",example:"Loaded Dice",detail:"'Climate change loads the weather dice, making some extreme events more likely — just as loaded dice don't guarantee a six on every throw, but do make sixes more likely.' Caution: the gambling metaphor might be misread as suggesting scientists are 'fixing' results."},{principle:"Talk About the Real World",tool:"Metaphors",example:"Bathtub Filling with CO₂",detail:"'The atmosphere is like a bathtub filling with CO₂. Even if we turn off the tap, the water already in the bath stays. This shows why negative emissions technologies — removing CO₂ from the atmosphere — are part of the picture.' Tested to increase comprehension and policy support."},{principle:"Connect with Your Audience",tool:"Audience Research",example:"Shared Values Mapping",detail:"Before speaking to a farming audience, research local weather patterns and recent harvest disruptions. Open with that local reality — then connect it to climate projections. For a faith group, stewardship framing ('caring for creation') has been shown to resonate across Christian, Muslim, Jewish, and other communities."},{principle:"Tell a Human Story",tool:"ABT Template",example:"Personal Story Structure",detail:"And: 'As a parent, I've always wanted to share the seasonal experiences I had as a child with my own children.' But: 'As I've raised them, I've watched the seasons become disrupted, and I've felt this as a profound challenge to my sense of what it means to be a good father.' Therefore: 'That's why I decided to return to university and study the social science of climate change — and why I'm here today.' (Dr Chris Shaw, Climate Outreach — adapted from the handbook)"},{principle:"Lead with What You Know",tool:"Uncertainty Communication",example:"Leading with Consensus",detail:"Don't: 'Although there is a great deal that is unknown about how local services will be affected, climate change is likely to lead to heavier downpours.' Do: 'The risk of heavier downpours and more flooding in this area, disrupting businesses and schools, is now higher because of climate change.' Lead with the known risk; introduce uncertainty only in context."},{principle:"Use Effective Visual Communication",tool:"Image Selection",example:"Climate Visuals Principles",detail:"For an event on international climate negotiations: instead of the standard image of world leaders sitting at a negotiating table (familiar, emotionally flat, distant from daily life), choose an image of a solar engineer trainer in India, or a community repairing flood barriers in Sri Lanka — real people, local scale, identifiable emotion, solutions-oriented."}],p=[{principle:"1 — Confident Communicator",dos:["Use your authentic personal voice alongside scientific expertise","Be clear when speaking as IPCC vs as independent expert","Assume goodwill in your audience"],donts:["Assume hostile or dismissive audiences","Be silent when a less-qualified voice may fill the void","Confuse your IPCC capacity with your wider expert identity"]},{principle:"2 — Real World, Not Abstract",dos:["Start with locally relevant examples","Use tested frames: waste/efficiency, health, balance","Use metaphors: loaded dice, blanket, bathtub"],donts:["Lead with '2°C' or 'ppm CO₂' figures","Frame primarily in global or abstract terms","Lead with the science before connecting to people's lives"]},{principle:"3 — Connect with Values",dos:["Research audience values before speaking","Find a local fact or story as an entry point","Ask what they love that climate threatens"],donts:["Lead with facts before connecting to values","Assume that more information changes minds","Use only environmentalist framing with mixed audiences"]},{principle:"4 — Tell a Human Story",dos:["Share personal motivation as a scientist","Use ABT structure (And/But/Therefore)","Always include solutions and a path to action"],donts:["Present only problem without solution","Rely on statistics and graphs alone","Omit the human face behind the science"]},{principle:"5 — Lead with What You Know",dos:["State the consensus clearly and early","Quantify climate attribution for extreme weather","Discuss weather-climate links before events occur"],donts:["Lead with uncertainty before establishing consensus","Say 'no single event can be attributed to climate change' as a default","Conflate scientific debate about details with uncertainty about basics"]},{principle:"6 — Effective Visual Communication",dos:["Show real people with visible emotions","Use local scale images when possible","Pair impact images with action opportunities","Test data visuals on your actual audience"],donts:["Default to polar bears, smokestacks, or protesters","Use staged photo-ops","Present impact imagery without agency or solutions","Assume audiences can read complex scientific charts without guidance"]}];function h({apiKey:e}){let[t,n]=(0,o.useState)([]),[r,a]=(0,o.useState)(""),[l,s]=(0,o.useState)(!1),c=(0,o.useRef)(null);async function f(){if(!r.trim()||l)return;let i=r.trim();a(""),s(!0),n(e=>[...e,{role:"user",text:i}]);try{let r=t.map(e=>({role:"user"===e.role?"user":"model",parts:[{text:e.text}]})),a=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${e}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:`You are an expert guide on the Climate Outreach handbook "Principles for Effective Communication and Public Engagement on Climate Change" (Corner, Shaw, Clarke, 2018). Use the handbook's principles and evidence precisely. Full content:
