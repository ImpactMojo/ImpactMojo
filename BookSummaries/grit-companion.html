<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grit — ImpactMojo Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F5F0;--card:#fff;--border:#E8E0D5;--text:#1C1C1C;--muted:#6B6560;
  --accent:#1A6B5A;--accent-light:#EBF5F2;--teal:#1A6B5A;--teal-light:#EBF5F2;
  --radius:8px;
}
body{background:var(--bg);font-family:'Lora','Georgia',serif;color:var(--text)}
.app{min-height:100vh;display:flex;flex-direction:column}
nav{background:#1C1C1C;display:flex;align-items:center;gap:20px;padding:0 20px;min-height:52px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand-name{font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab-btn{background:none;border:none;padding:6px 13px;font-family:Inter,sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.tab-btn:hover{color:rgba(255,255,255,.85)}
.tab-btn.active{color:#fff;background:var(--accent)}
main{flex:1;padding:32px 20px;max-width:860px;margin:0 auto;width:100%}
.h1{font-family:Inter,sans-serif;font-size:22px;font-weight:700;margin-bottom:8px}
.sub{color:var(--muted);font-size:15px;margin-bottom:24px;font-family:Inter,sans-serif;line-height:1.5}
.panel{display:none}.panel.active{display:block}

/* HERO */
.hero{background:#1C1C1C;color:#fff;border-radius:12px;padding:32px;margin-bottom:20px}
.day-badge{display:inline-block;background:var(--accent);font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:4px;margin-bottom:14px}
.hero h1{font-size:34px;font-weight:700;margin-bottom:4px}
.hero .auth{font-family:Inter,sans-serif;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px}
.hero .tagline{font-size:15px;color:rgba(255,255,255,.8);line-height:1.6;max-width:620px;margin-bottom:18px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{font-family:Inter,sans-serif;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 14px;text-align:center}
.stat-n{font-size:30px;font-weight:700;color:var(--accent);font-family:Inter,sans-serif}
.stat-l{font-family:Inter,sans-serif;font-size:12px;color:var(--muted);margin-top:4px}
.arg{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:24px}
.arg p{font-size:15px;line-height:1.75}
.arg p+p{margin-top:1rem}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.nav-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:left;cursor:pointer;transition:all .15s}
.nav-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.nav-card-label{font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.nav-card-desc{font-family:Inter,sans-serif;font-size:12px;color:var(--muted)}

/* PATHWAYS */
.pw-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.pw-btn{font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s}
.pw-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pw-desc{font-family:Inter,sans-serif;font-size:14px;color:var(--muted);padding:12px 14px;background:var(--accent-light);border-radius:6px;margin-bottom:20px;line-height:1.5}
.pw-steps{display:flex;flex-direction:column;gap:10px}
.pw-step{display:flex;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.step-n{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-family:Inter,sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-family:Inter,sans-serif;font-size:14px;font-weight:700;margin-bottom:3px}
.step-focus{font-family:Inter,sans-serif;font-size:13px;color:var(--muted);line-height:1.5}

/* SECTIONS */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.sec-header{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;cursor:pointer;background:none;border:none;text-align:left;width:100%}
.sec-num{font-family:Inter,sans-serif;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;min-width:24px;padding-top:2px}
.sec-title{font-family:Inter,sans-serif;font-size:15px;font-weight:700;margin-bottom:2px}
.sec-sub{font-family:Inter,sans-serif;font-size:12px;color:var(--muted)}
.sec-chev{font-size:16px;color:var(--muted);padding-top:2px;margin-left:auto}
.sec-body{padding:0 18px 18px 56px;border-top:1px solid var(--border)}
.sec-summary{font-size:15px;line-height:1.75;padding-top:14px;margin-bottom:18px}
.ideas-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.idea-item{display:flex;gap:8px;margin-bottom:7px;font-family:Inter,sans-serif;font-size:13px;line-height:1.55}
.idea-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
blockquote{font-style:italic;font-size:14px;color:var(--muted);border-left:3px solid var(--accent);padding-left:12px;margin-bottom:8px;line-height:1.6}
.dev-toggle{font-family:Inter,sans-serif;font-size:12px;font-weight:600;color:var(--teal);background:var(--teal-light);border:none;padding:7px 12px;border-radius:4px;cursor:pointer;margin-top:10px}
.dev-text{margin-top:10px;font-family:Inter,sans-serif;font-size:13px;line-height:1.65;background:var(--teal-light);padding:12px;border-radius:6px}

/* CONCEPTS */
.concept-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.concept-card:hover,.concept-card.open{border-color:var(--accent)}
.concept-term{font-family:Inter,sans-serif;font-size:15px;font-weight:700}
.concept-def{font-family:Inter,sans-serif;font-size:14px;line-height:1.7;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prac-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-top:10px;margin-bottom:4px}
.prac-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65;color:var(--muted)}

/* TOOLKIT */
.tool-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tool-btn{font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s}
.tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px}
.tool-panel.active{display:block}
.tool-intro{font-family:Inter,sans-serif;font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.fld-label{font-family:Inter,sans-serif;font-size:13px;font-weight:600;margin-bottom:5px;display:block}
.fld{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;outline:none;background:var(--bg);margin-bottom:12px}
.fld:focus{border-color:var(--accent)}
.output-box{background:var(--accent-light);padding:14px;border-radius:6px;margin-top:16px;font-family:Inter,sans-serif;font-size:14px;line-height:1.65}
.output-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px}

/* CONTEXT */
.conn-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px;padding:16px 18px;margin-bottom:10px}
.conn-book{font-family:Inter,sans-serif;font-size:14px;font-weight:700;margin-bottom:5px}
.conn-text{font-family:Inter,sans-serif;font-size:13px;color:var(--muted);line-height:1.65}
.crit-item{display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.crit-n{width:24px;height:24px;border-radius:50%;background:#FFF8E6;color:#C8910A;font-family:Inter,sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crit-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65}
.context-h{font-family:Inter,sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;margin-top:6px}

/* ASK */
.ask-setup{}
.setup-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.setup-step{display:flex;gap:12px;font-family:Inter,sans-serif;font-size:14px;line-height:1.5}
.setup-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.setup-step a{color:var(--accent)}
.key-row{display:flex;gap:10px}
.key-input{flex:1;max-width:400px;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;outline:none}
.key-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:Inter,sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.key-btn:disabled{opacity:.4;cursor:not-allowed}
.ask-ui{display:flex;flex-direction:column;height:calc(100vh - 180px)}
.ask-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ask-hdr-title{font-family:Inter,sans-serif;font-size:18px;font-weight:700}
.ask-reset{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:Inter,sans-serif;font-size:12px;color:var(--muted);cursor:pointer}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px;margin-bottom:10px}
.suggested-label{font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.sug-btn{display:block;width:100%;text-align:left;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.sug-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.msg{max-width:85%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-text{font-family:Inter,sans-serif;font-size:13px;line-height:1.65;padding:10px 14px;border-radius:8px;white-space:pre-wrap}
.msg.user .msg-text{background:var(--accent);color:#fff}
.msg.assistant .msg-text{background:var(--card);border:1px solid var(--border)}
.typing{display:flex;gap:4px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ask-input-row{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:10px}
.ask-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:Inter,sans-serif;font-size:13px;resize:none;outline:none;background:var(--bg)}
.ask-input:focus{border-color:var(--accent)}
.ask-send{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:Inter,sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.ask-send:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr)}.nav-grid{grid-template-columns:1fr 1fr}.sec-body{padding-left:18px}}
</style>
</head>
<body>
<div class="app">
<nav>
  <div class="brand"><div class="dot"></div><span class="brand-name">ImpactMojo</span></div>
  <div class="tabs" id="tabbar"></div>
</nav>
<main id="main-content">
  <div class="panel active" id="p-overview"></div>
  <div class="panel" id="p-pathways"></div>
  <div class="panel" id="p-sections"></div>
  <div class="panel" id="p-concepts"></div>
  <div class="panel" id="p-toolkit"></div>
  <div class="panel" id="p-context"></div>
  <div class="panel" id="p-ask"></div>
</main>
</div>
<script>
const DATA = {"title": "Grit", "dayBadge": "Day 17 of 30", "author": "Angela Duckworth · 2016 · Scribner", "tagline": "Duckworth's empirical argument that passion combined with perseverance — not talent — predicts who achieves at the highest levels, and a framework for developing both.", "pills": ["Psychology", "Achievement", "Resilience", "Character"], "stats": [{"n": "4", "l": "Core sections"}, {"n": "5", "l": "Key concepts"}, {"n": "3", "l": "Learning pathways"}, {"n": "3", "l": "Connected works"}], "argument": ["Duckworth's thesis is that talent, as measured by aptitude tests and first impressions, is a poor predictor of high achievement. What predicts it reliably is grit: a combination of passion (sustained, direction-giving commitment to a long-term goal) and perseverance (effort applied consistently despite setbacks). The formula she presents — Talent × Effort = Skill, Skill × Effort = Achievement — means effort counts twice, talent once.", "The second claim is that grit is developable, not fixed. From inside (cultivating interest, building deliberate practice habits, connecting work to purpose, developing growth mindset) and from outside (wise parenting, demanding-and-supportive teachers, gritty cultures). Both arguments carry policy implications: identifying talent early and investing in it, while ignoring perseverance, is the wrong model for education, workforce development, and leadership selection."], "accent": "#1A6B5A", "accent_light": "#EBF5F2", "pathways": [{"label": "Development Practitioner", "desc": "Application to programme design, management, and field practice.", "steps": [{"section": "Why Grit Matters More Than Talent", "focus": "West Point's Whole Candidate Score — the most predictive admissions instrument available — predicted graduation less well than a simple 12-item grit scale. Duckworth's research across multiple high-st..."}, {"section": "What Grit Actually Is", "focus": "Grit is not intensity of effort or volatility of enthusiasm. It is directional consistency over time. Gritty people have a clear top-level goal that organises their entire goal hierarchy — all lower-l..."}, {"section": "Growing Grit from the Inside", "focus": "Four psychological assets constitute grit, each developable: interest (loving what you do — passion is cultivated through years of exploration, not discovered in a single eureka moment); deliberate pr..."}, {"section": "Growing Grit from the Outside", "focus": "Grit develops in response to environmental demands. Wise parenting — simultaneously supportive and demanding, setting high expectations backed by genuine care — produces grittier children than either ..."}]}, {"label": "Development Researcher", "desc": "Application to research, evidence, and academic work.", "steps": [{"section": "Why Grit Matters More Than Talent", "focus": "West Point's Whole Candidate Score — the most predictive admissions instrument available — predicted graduation less well than a simple 12-item grit scale. Duckworth's research across multiple high-st..."}, {"section": "What Grit Actually Is", "focus": "Grit is not intensity of effort or volatility of enthusiasm. It is directional consistency over time. Gritty people have a clear top-level goal that organises their entire goal hierarchy — all lower-l..."}, {"section": "Growing Grit from the Inside", "focus": "Four psychological assets constitute grit, each developable: interest (loving what you do — passion is cultivated through years of exploration, not discovered in a single eureka moment); deliberate pr..."}, {"section": "Growing Grit from the Outside", "focus": "Grit develops in response to environmental demands. Wise parenting — simultaneously supportive and demanding, setting high expectations backed by genuine care — produces grittier children than either ..."}]}, {"label": "Personal Growth", "desc": "Direct personal application.", "steps": [{"section": "Why Grit Matters More Than Talent", "focus": "West Point's Whole Candidate Score — the most predictive admissions instrument available — predicted graduation less well than a simple 12-item grit scale. Duckworth's research across multiple high-st..."}, {"section": "What Grit Actually Is", "focus": "Grit is not intensity of effort or volatility of enthusiasm. It is directional consistency over time. Gritty people have a clear top-level goal that organises their entire goal hierarchy — all lower-l..."}, {"section": "Growing Grit from the Inside", "focus": "Four psychological assets constitute grit, each developable: interest (loving what you do — passion is cultivated through years of exploration, not discovered in a single eureka moment); deliberate pr..."}, {"section": "Growing Grit from the Outside", "focus": "Grit develops in response to environmental demands. Wise parenting — simultaneously supportive and demanding, setting high expectations backed by genuine care — produces grittier children than either ..."}]}], "sections": [{"title": "Why Grit Matters More Than Talent", "subtitle": "The talent trap and effort's double role", "summary": "West Point's Whole Candidate Score — the most predictive admissions instrument available — predicted graduation less well than a simple 12-item grit scale. Duckworth's research across multiple high-stakes domains (spelling bees, sales, military training, education) consistently finds grit predicting performance over talent measures. The talent myth persists because: (a) we find natural talent narratives more compelling and exciting than effort narratives, and (b) attributing others' success to innate talent lets us off the hook for our own lower achievement. Duckworth's formula: Talent × Effort = Skill; Skill × Effort = Achievement. Effort counts twice, talent once.", "ideas": ["The talent myth: we systematically overvalue talent and undervalue effort in our assessments of potential.", "The effort-doubles formula: talent produces skill only if effort is applied; skill produces achievement only if effort is applied again.", "West Point evidence: the military's comprehensive admissions process predicted graduation less accurately than a 12-item grit scale.", "The costly consequence of talent overvaluation: organisations invest in selecting for talent and then are surprised when retention and performance are predicted by perseverance, not aptitude."], "quotes": ["\"What we eventually accomplish may depend more on our passion and perseverance than on our innate talent.\"", "\"With effort, talent becomes skill and, at the very same time, effort makes skill productive.\""], "devEcon": "Development organisations select staff and leaders based heavily on credentials and aptitude (the talent signal), rarely assessing perseverance in challenging field conditions. Duckworth's evidence would suggest this is the wrong hiring criterion. The selection challenge in development is compounded by the fact that fieldwork routinely requires sustained effort in demoralising conditions — exactly the setting where grit matters most and where aptitude tests are least predictive."}, {"title": "What Grit Actually Is", "subtitle": "Passion as direction, perseverance as fuel", "summary": "Grit is not intensity of effort or volatility of enthusiasm. It is directional consistency over time. Gritty people have a clear top-level goal that organises their entire goal hierarchy — all lower-level goals serve the top-level goal, and when lower-level goals stop serving it, gritty people change them without changing the top-level direction. The Grit Scale measures two dimensions: consistency of interests (how often attention shifts to new projects) and perseverance of effort (how hard you work despite setbacks). Both are needed; either without the other produces different failure modes.", "ideas": ["Grit is not stubbornness: gritty people change how they pursue their goals, not which ultimate goal they pursue.", "Goal hierarchy: a top-level purpose organises mid-level goals (strategies) and low-level goals (daily tasks). Grit is loyalty to the top-level goal while remaining flexible about the lower levels.", "The passion component is often misunderstood: it is not excitement but direction — a deep, stable sense of what you are trying to do with your life.", "Enthusiasm is common, endurance is rare: many people begin things with high enthusiasm; gritty people maintain consistent effort long after the initial excitement fades."], "quotes": ["\"Enthusiasm is common. Endurance is rare.\"", "\"Grit is about moving in the same direction consistently and with endurance, like having a clear inner compass.\""], "devEcon": "Development organisations face a structural grit challenge: high staff turnover, donor funding cycles that create short time horizons, and sector-wide cultures that value versatility over depth all work against the kind of sustained, directional commitment that Duckworth's research identifies as grit. Designing career structures that reward long-term specialisation over frequent switching is a structural application of Duckworth's findings."}, {"title": "Growing Grit from the Inside", "subtitle": "Interest, practice, purpose, and hope", "summary": "Four psychological assets constitute grit, each developable: interest (loving what you do — passion is cultivated through years of exploration, not discovered in a single eureka moment); deliberate practice (Ericsson's model: set a stretch goal just beyond current ability, give it full attention, seek immediate feedback, repeat with new stretch goals); purpose (the belief that your work matters beyond yourself — this typically emerges after years of developing interest and skill, not before); and hope (growth mindset plus learned optimism — the belief that effort can improve outcomes and that setbacks are temporary and specific rather than permanent and pervasive).", "ideas": ["Interest is cultivated through repeated exposure and positive feedback, not discovered whole.", "Deliberate practice is uncomfortable but produces far faster skill development than undirected practice.", "Purpose amplifies grit: believing your work benefits others sustains effort through demoralising periods.", "Growth mindset (Dweck): the belief that abilities can be developed through effort. Fixed mindset makes failure an identity threat; growth mindset makes it information."], "quotes": ["\"Passion for your work is a little bit of discovery, followed by a lot of development, and then a lifetime of deepening.\"", "\"Deliberate practice is for preparation, and flow is for performance.\""], "devEcon": "BRAC's graduation programme is an implicit application of Duckworth's inside-out grit framework: it builds beneficiaries' sense of purpose (through asset transfer and community membership), deliberate practice (through structured activity requirements), and hope (through visible progress). The programme's success may partly reflect its effectiveness at building the psychological assets Duckworth identifies."}, {"title": "Growing Grit from the Outside", "subtitle": "Parenting, culture, and the training ground", "summary": "Grit develops in response to environmental demands. Wise parenting — simultaneously supportive and demanding, setting high expectations backed by genuine care — produces grittier children than either permissive or authoritarian approaches. Extracurricular activities with multi-year commitment requirements (sports teams, music programmes, debate clubs) build grit through the experience of persisting through difficulty. Cultures of grit — environments where sustained effort is the norm and celebrated — accelerate individual grit development through social spillover. The Hard Thing Rule: every family member must do one hard thing that requires daily deliberate practice.", "ideas": ["Wise parenting is the most consistent predictor of child grit outside the child themselves.", "Follow-through in extracurricular activities is the best external predictor of adult grit.", "Cultural environment sh // Tab management
const TABS = [
  {id:"overview",label:"Overview"},
  {id:"pathways",label:"Pathways"},
  {id:"sections",label:"Sections"},
  {id:"concepts",label:"Concepts"},
  {id:"toolkit",label:"Toolkit"},
  {id:"context",label:"Context"},
  {id:"ask",label:"Ask"},
];

const tabbar = document.getElementById("tabbar");
TABS.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (t.id === "overview" ? " active" : "");
  btn.textContent = t.label;
  btn.onclick = () => switchTab(t.id);
  tabbar.appendChild(btn);
});

function switchTab(id) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("p-" + id).classList.add("active");
  tabbar.querySelectorAll(".tab-btn")[TABS.findIndex(t=>t.id===id)].classList.add("active");
}

// ASK
(function() {
  const el = document.getElementById("p-ask");
  let apiKey = "", msgs = [], loading = false;
  
  function renderSetup() {
    el.innerHTML = `
      <div class="ask-setup">
        <div class="h1">Ask the Book</div>
        <div class="sub">AI-powered Q&A using Gemini 2.0 Flash (free). Requires a Google AI Studio API key.</div>
        <div class="setup-steps">
          <div class="setup-step"><span class="setup-num">1</span><span>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> and create a free API key.</span></div>
          <div class="setup-step"><span class="setup-num">2</span><span>Paste it below. The key stays in your browser only and is never stored.</span></div>
        </div>
        <div class="key-row">
          <input class="key-input" type="password" id="key-in" placeholder="AIza..." oninput="document.getElementById('key-submit').disabled=!this.value.trim()"/>
          <button class="key-btn" id="key-submit" disabled onclick="__setKey()">Connect</button>
        </div>
      </div>
    `;
  }
  
  function renderChat() {
    el.innerHTML = `
      <div class="ask-ui">
        <div class="ask-hdr"><span class="ask-hdr-title">Ask the Book</span><button class="ask-reset" onclick="__resetKey()">Change key</button></div>
        <div class="msgs" id="msgs-box">
          ${msgs.length===0?`<div><div class="suggested-label">Suggested questions</div>${DATA.suggested.map(q=>`<button class="sug-btn" onclick="__ask('${q.replace(/'/g,"\'")}')">${q}</button>`).join("")}</div>`:""}
          ${msgs.map(m=>`<div class="msg ${m.role}"><div class="msg-text">${m.content}</div></div>`).join("")}
          ${loading?`<div class="msg assistant"><div class="typing"><span></span><span></span><span></span></div></div>`:""}
        </div>
        <div class="ask-input-row">
          <textarea class="ask-input" id="ask-in" rows="2" placeholder="Ask about the book..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();__sendAsk()}"></textarea>
          <button class="ask-send" id="ask-send" onclick="__sendAsk()">Send</button>
        </div>
      </div>
    `;
    const box = document.getElementById("msgs-box");
    if(box) box.scrollTop = box.scrollHeight;
  }
  
  window.__setKey = () => {
    const v = document.getElementById("key-in").value.trim();
    if(v) { apiKey = v; renderChat(); }
  };
  window.__resetKey = () => { apiKey=""; msgs=[]; renderSetup(); };
  window.__ask = (q) => {
    document.getElementById("ask-in").value = q;
    __sendAsk();
  };
  window.__sendAsk = async () => {
    const inp = document.getElementById("ask-in");
    if(!inp) return;
    const q = inp.value.trim();
    if(!q || loading) return;
    inp.value = "";
    msgs.push({role:"user",content:q});
    loading = true; renderChat();
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          system_instruction:{parts:[{text:DATA.systemPrompt}]},
          contents: msgs.map(m=>{return{role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}}).slice(0,-1).concat([{role:"user",parts:[{text:q}]}]),
          generationConfig:{maxOutputTokens:1200,temperature:0.3}
        })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error?.message||"API error");
      const reply = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"No response.";
      msgs.push({role:"assistant",content:reply});
    } catch(e) {
      msgs.push({role:"assistant",content:"Error: "+e.message});
    }
    loading = false; renderChat();
  };
  
  renderSetup();
})();
</script>
