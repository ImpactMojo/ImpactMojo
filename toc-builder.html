<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theory of Change Builder — ImpactMojo</title>
<style>
:root{--bg:#f8fafc;--card-bg:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#94a3b8;--accent:#0EA5E9;--hover:#f1f5f9}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card-bg:#1e293b;--border:#334155;--text:#e2e8f0;--text-muted:#64748b;--accent:#38bdf8;--hover:#1e293b}}
*{box-sizing:border-box;margin:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* Toolbar */
.toc-toolbar{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;background:var(--card-bg);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.toc-toolbar h1{font-size:1rem;font-weight:700;margin-right:auto}
.toc-toolbar a{color:var(--accent);text-decoration:none;font-size:0.8rem}
.toc-btn{padding:0.35rem 0.75rem;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:0.78rem;font-weight:600;cursor:pointer}
.toc-btn:hover{border-color:var(--accent)}
.toc-btn-primary{background:var(--accent);color:white;border-color:var(--accent)}
select.toc-btn{appearance:auto}
/* Layout */
.toc-layout{display:flex;flex:1;overflow:hidden}
/* Sidebar — BCT Techniques */
.toc-sidebar{width:280px;background:var(--card-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.toc-sidebar-header{padding:0.75rem;border-bottom:1px solid var(--border)}
.toc-sidebar-header input{width:100%;padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:6px;font-size:0.8rem;background:var(--bg);color:var(--text)}
.toc-sidebar-list{flex:1;overflow-y:auto;padding:0.5rem}
.toc-bct-category{margin-bottom:0.5rem}
.toc-bct-cat-header{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);padding:0.3rem 0.4rem;cursor:pointer;display:flex;align-items:center;gap:0.3rem}
.toc-bct-cat-header:hover{color:var(--text)}
.toc-bct-cat-list{display:none}
.toc-bct-cat-list.open{display:block}
.toc-bct-item{padding:0.35rem 0.5rem;font-size:0.78rem;border-radius:6px;cursor:grab;margin-bottom:2px;border:1px solid transparent;display:flex;align-items:center;gap:0.4rem;user-select:none}
.toc-bct-item:hover{background:var(--hover);border-color:var(--border)}
.toc-bct-item .bct-evidence{font-size:0.6rem;padding:0.1rem 0.3rem;border-radius:4px;font-weight:600}
.bct-strong{background:#dcfce7;color:#16a34a}
.bct-moderate{background:#fef3c7;color:#d97706}
/* Canvas */
.toc-canvas-wrap{flex:1;position:relative;overflow:auto;background:var(--bg);background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:24px 24px}
.toc-canvas{position:relative;width:3000px;height:2000px;min-width:100%;min-height:100%}
/* Nodes */
.toc-node{position:absolute;background:var(--card-bg);border:2px solid var(--border);border-radius:10px;min-width:160px;max-width:240px;cursor:move;user-select:none;z-index:2}
.toc-node:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(14,165,233,0.15)}
.toc-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(14,165,233,0.3)}
.toc-node-header{padding:0.4rem 0.6rem;border-bottom:1px solid var(--border);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0}
.toc-node-body{padding:0.5rem 0.6rem}
.toc-node-title{font-size:0.85rem;font-weight:600;outline:none;min-height:1.2em}
.toc-node-desc{font-size:0.72rem;color:var(--text-muted);margin-top:0.25rem;outline:none;min-height:1em}
.toc-node-bcts{display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.4rem}
.toc-node-bct-tag{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:8px;background:rgba(14,165,233,0.1);color:var(--accent);font-weight:600;cursor:pointer}
.toc-node-bct-tag:hover{text-decoration:line-through;opacity:0.6}
.toc-node-indicator{font-size:0.65rem;color:var(--text-muted);margin-top:0.3rem;padding-top:0.3rem;border-top:1px dashed var(--border);outline:none;min-height:0.8em}
.toc-node-delete{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0;line-height:1}
.toc-node-delete:hover{color:#ef4444}
/* Node type colors */
.toc-node[data-type="input"] .toc-node-header{background:rgba(14,165,233,0.1);color:#0EA5E9}
.toc-node[data-type="activity"] .toc-node-header{background:rgba(99,102,241,0.1);color:#6366F1}
.toc-node[data-type="output"] .toc-node-header{background:rgba(245,158,11,0.1);color:#F59E0B}
.toc-node[data-type="outcome"] .toc-node-header{background:rgba(16,185,129,0.1);color:#10B981}
.toc-node[data-type="impact"] .toc-node-header{background:rgba(236,72,153,0.1);color:#EC4899}
.toc-node[data-type="assumption"] .toc-node-header{background:rgba(148,163,184,0.1);color:#64748b}
/* Connections (SVG) */
.toc-connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.toc-connections line{stroke:var(--border);stroke-width:2;marker-end:url(#arrowhead)}
.toc-connections line:hover{stroke:var(--accent)}
/* Connect handles */
.toc-connect-handle{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:crosshair;z-index:3;opacity:0;transition:opacity 0.15s}
.toc-node:hover .toc-connect-handle{opacity:1}
/* Mobile */
@media(max-width:768px){.toc-sidebar{position:absolute;left:-280px;z-index:10;height:100%;transition:left 0.2s}.toc-sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.1)}}
/* Save indicator */
.toc-save-indicator{font-size:0.7rem;color:var(--text-muted)}
</style>
</head>
<body>

<div class="toc-toolbar">
  <h1>Theory of Change Builder</h1>
  <a href="/">&larr; ImpactMojo</a>
  <select class="toc-btn" id="templateSelect">
    <option value="">Load Template...</option>
    <option value="health">Health Program</option>
    <option value="education">Education Program</option>
    <option value="wash">WASH Program</option>
    <option value="livelihoods">Livelihoods Program</option>
    <option value="blank">Blank Canvas</option>
  </select>
  <button class="toc-btn" id="addNodeBtn">+ Add Node</button>
  <select class="toc-btn" id="nodeTypeSelect">
    <option value="input">Input</option>
    <option value="activity">Activity</option>
    <option value="output">Output</option>
    <option value="outcome">Outcome</option>
    <option value="impact">Impact</option>
    <option value="assumption">Assumption</option>
  </select>
  <button class="toc-btn" id="toggleSidebar">BCT Panel</button>
  <button class="toc-btn" id="saveBtn">Save</button>
  <button class="toc-btn" id="loadBtn">Load</button>
  <button class="toc-btn toc-btn-primary" id="exportBtn">Export PNG</button>
  <span class="toc-save-indicator" id="saveIndicator"></span>
</div>

<div class="toc-layout">
  <!-- BCT Sidebar -->
  <div class="toc-sidebar" id="bctSidebar">
    <div class="toc-sidebar-header">
      <input type="search" id="bctSearch" placeholder="Search BCT techniques...">
    </div>
    <div class="toc-sidebar-list" id="bctList">
      <p style="padding:1rem;color:var(--text-muted);font-size:0.8rem;">Loading BCT techniques...</p>
    </div>
  </div>

  <!-- Canvas -->
  <div class="toc-canvas-wrap" id="canvasWrap">
    <svg class="toc-connections" id="connections">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-muted)"/>
        </marker>
      </defs>
    </svg>
    <div class="toc-canvas" id="canvas"></div>
  </div>
</div>

<script>
(function(){
'use strict';

var STORAGE_KEY = 'impactmojo_toc_builder';
var canvas = document.getElementById('canvas');
var svgConnections = document.getElementById('connections');
var nodes = [];
var connections = [];
var nodeIdCounter = 0;
var selectedNode = null;
var connectingFrom = null;

// ── BCT Data Loading ────────────────────────────────────────────────
var bctData = null;
fetch('data/bct-repository.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    bctData = data;
    renderBctPanel(data);
  })
  .catch(function(){ document.getElementById('bctList').innerHTML = '<p style="padding:1rem;color:#ef4444;font-size:0.8rem;">Failed to load BCT data.</p>'; });

function renderBctPanel(data){
  var list = document.getElementById('bctList');
  var html = '';
  data.categories.forEach(function(cat){
    html += '<div class="toc-bct-category">';
    html += '<div class="toc-bct-cat-header" data-cat="' + cat.id + '" style="color:' + cat.color + '">&#x25B6; ' + cat.name + ' (' + cat.techniques.length + ')</div>';
    html += '<div class="toc-bct-cat-list" data-cat-list="' + cat.id + '">';
    cat.techniques.forEach(function(t){
      var evCls = t.evidenceLevel === 'Strong' ? 'bct-strong' : 'bct-moderate';
      html += '<div class="toc-bct-item" draggable="true" data-bct-id="' + t.id + '" data-bct-name="' + t.name.replace(/"/g,'&quot;') + '">';
      html += '<span>' + t.name + '</span>';
      html += '<span class="bct-evidence ' + evCls + '">' + t.evidenceLevel + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  list.innerHTML = html;

  // Toggle categories
  list.querySelectorAll('.toc-bct-cat-header').forEach(function(h){
    h.addEventListener('click', function(){
      var catList = list.querySelector('[data-cat-list="' + h.dataset.cat + '"]');
      catList.classList.toggle('open');
      h.innerHTML = (catList.classList.contains('open') ? '&#x25BC; ' : '&#x25B6; ') + h.textContent.replace(/^[▶▼]\s*/, '');
    });
  });

  // Drag BCT items
  list.querySelectorAll('.toc-bct-item').forEach(function(item){
    item.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', JSON.stringify({type:'bct', id: item.dataset.bctId, name: item.dataset.bctName}));
    });
  });
}

// BCT search
document.getElementById('bctSearch').addEventListener('input', function(e){
  var q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.toc-bct-item').forEach(function(item){
    var match = !q || item.textContent.toLowerCase().indexOf(q) !== -1;
    item.style.display = match ? '' : 'none';
  });
  if (q) {
    document.querySelectorAll('.toc-bct-cat-list').forEach(function(cl){ cl.classList.add('open'); });
  }
});

// ── Node Management ─────────────────────────────────────────────────
function createNode(type, x, y, title, desc, indicator){
  var id = 'node_' + (++nodeIdCounter);
  var labels = {input:'Input',activity:'Activity',output:'Output',outcome:'Outcome',impact:'Impact',assumption:'Assumption'};

  var el = document.createElement('div');
  el.className = 'toc-node';
  el.dataset.type = type;
  el.dataset.id = id;
  el.style.left = x + 'px';
  el.style.top = y + 'px';

  el.innerHTML =
    '<div class="toc-node-header"><span>' + (labels[type]||type) + '</span><button class="toc-node-delete">&times;</button></div>' +
    '<div class="toc-node-body">' +
      '<div class="toc-node-title" contenteditable="true" data-placeholder="Enter title...">' + (title||'') + '</div>' +
      '<div class="toc-node-desc" contenteditable="true" data-placeholder="Description...">' + (desc||'') + '</div>' +
      '<div class="toc-node-bcts"></div>' +
      '<div class="toc-node-indicator" contenteditable="true" data-placeholder="Indicator...">' + (indicator||'') + '</div>' +
    '</div>' +
    '<div class="toc-connect-handle" title="Drag to connect"></div>';

  canvas.appendChild(el);

  var node = {id:id, el:el, type:type, bcts:[]};
  nodes.push(node);

  // Drag node
  makeDraggable(el, node);

  // Delete node
  el.querySelector('.toc-node-delete').addEventListener('click', function(){
    removeNode(id);
  });

  // Select node
  el.addEventListener('click', function(e){
    if (e.target.closest('.toc-node-delete') || e.target.closest('.toc-connect-handle') || e.target.isContentEditable) return;
    selectNode(id);
  });

  // Connect handle
  var handle = el.querySelector('.toc-connect-handle');
  handle.addEventListener('mousedown', function(e){
    e.stopPropagation();
    connectingFrom = id;
    document.body.style.cursor = 'crosshair';
  });

  // Drop BCT on node
  el.addEventListener('dragover', function(e){ e.preventDefault(); el.classList.add('selected'); });
  el.addEventListener('dragleave', function(){ el.classList.remove('selected'); });
  el.addEventListener('drop', function(e){
    e.preventDefault();
    el.classList.remove('selected');
    try {
      var data = JSON.parse(e.dataTransfer.getData('text/plain'));
      if (data.type === 'bct') addBctToNode(id, data.id, data.name);
    } catch(err){}
  });

  autoSave();
  return node;
}

function makeDraggable(el, node){
  var startX, startY, origX, origY;
  el.addEventListener('mousedown', function(e){
    if (e.target.isContentEditable || e.target.closest('.toc-node-delete') || e.target.closest('.toc-connect-handle') || e.target.closest('.toc-node-bct-tag')) return;
    startX = e.clientX; startY = e.clientY;
    origX = parseInt(el.style.left)||0; origY = parseInt(el.style.top)||0;
    function onMove(ev){
      el.style.left = (origX + ev.clientX - startX) + 'px';
      el.style.top = (origY + ev.clientY - startY) + 'px';
      drawConnections();
    }
    function onUp(){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      autoSave();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function removeNode(id){
  var idx = nodes.findIndex(function(n){ return n.id === id; });
  if (idx === -1) return;
  nodes[idx].el.remove();
  nodes.splice(idx, 1);
  connections = connections.filter(function(c){ return c.from !== id && c.to !== id; });
  drawConnections();
  autoSave();
}

function selectNode(id){
  document.querySelectorAll('.toc-node.selected').forEach(function(n){ n.classList.remove('selected'); });
  var node = nodes.find(function(n){ return n.id === id; });
  if (node) { node.el.classList.add('selected'); selectedNode = id; }
}

function addBctToNode(nodeId, bctId, bctName){
  var node = nodes.find(function(n){ return n.id === nodeId; });
  if (!node || node.bcts.indexOf(bctId) !== -1) return;
  node.bcts.push(bctId);
  var container = node.el.querySelector('.toc-node-bcts');
  var tag = document.createElement('span');
  tag.className = 'toc-node-bct-tag';
  tag.textContent = bctName;
  tag.title = 'Click to remove';
  tag.addEventListener('click', function(){
    node.bcts = node.bcts.filter(function(b){ return b !== bctId; });
    tag.remove();
    autoSave();
  });
  container.appendChild(tag);
  autoSave();
}

// ── Connections ──────────────────────────────────────────────────────
document.addEventListener('mouseup', function(e){
  if (!connectingFrom) return;
  document.body.style.cursor = '';
  var target = e.target.closest('.toc-node');
  if (target && target.dataset.id !== connectingFrom){
    var exists = connections.some(function(c){ return c.from === connectingFrom && c.to === target.dataset.id; });
    if (!exists){
      connections.push({from: connectingFrom, to: target.dataset.id});
      drawConnections();
      autoSave();
    }
  }
  connectingFrom = null;
});

function drawConnections(){
  var lines = svgConnections.querySelectorAll('line');
  lines.forEach(function(l){ l.remove(); });

  connections.forEach(function(conn){
    var fromNode = nodes.find(function(n){ return n.id === conn.from; });
    var toNode = nodes.find(function(n){ return n.id === conn.to; });
    if (!fromNode || !toNode) return;

    var fromEl = fromNode.el;
    var toEl = toNode.el;
    var x1 = parseInt(fromEl.style.left) + fromEl.offsetWidth / 2;
    var y1 = parseInt(fromEl.style.top) + fromEl.offsetHeight;
    var x2 = parseInt(toEl.style.left) + toEl.offsetWidth / 2;
    var y2 = parseInt(toEl.style.top);

    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.style.pointerEvents = 'auto';
    line.style.cursor = 'pointer';
    line.addEventListener('dblclick', function(){
      connections = connections.filter(function(c){ return c.from !== conn.from || c.to !== conn.to; });
      drawConnections();
      autoSave();
    });
    svgConnections.appendChild(line);
  });
}

// ── Canvas drop (for BCT items dragged to empty space → creates node) ─
document.getElementById('canvasWrap').addEventListener('dragover', function(e){ e.preventDefault(); });
document.getElementById('canvasWrap').addEventListener('drop', function(e){
  if (e.target.closest('.toc-node')) return; // handled by node drop
  e.preventDefault();
  try {
    var data = JSON.parse(e.dataTransfer.getData('text/plain'));
    if (data.type === 'bct'){
      var wrap = document.getElementById('canvasWrap');
      var rect = wrap.getBoundingClientRect();
      var x = e.clientX - rect.left + wrap.scrollLeft;
      var y = e.clientY - rect.top + wrap.scrollTop;
      var node = createNode('activity', x, y, data.name, '');
      addBctToNode(node.id, data.id, data.name);
    }
  } catch(err){}
});

// ── Templates ───────────────────────────────────────────────────────
var TEMPLATES = {

    ],

  },
  wash: {

      {type:'assumption', x:550, y:380, title:'Assumptions', desc:'Markets accessible; women have time; social norms supportive'}
    ],
    connections: [[0,2],[1,3],[2,4],[3,5],[4,6],[5,7],[6,8],[7,8]]
  },
  blank: {name:'Blank Canvas', nodes:[], connections:[]}
};

document.getElementById('templateSelect').addEventListener('change', function(){
  var key = this.value;
  if (!key) return;
  var tmpl = TEMPLATES[key];
  if (!tmpl) return;
  if (nodes.length && !confirm('This will replace your current ToC. Continue?')) { this.value = ''; return; }
  clearCanvas();
  var nodeMap = [];
  tmpl.nodes.forEach(function(n){
    var node = createNode(n.type, n.x, n.y, n.title, n.desc);
    nodeMap.push(node.id);
  });
  tmpl.connections.forEach(function(c){
    connections.push({from: nodeMap[c[0]], to: nodeMap[c[1]]});
  });
  drawConnections();
  this.value = '';
  autoSave();
});

function clearCanvas(){
  nodes.forEach(function(n){ n.el.remove(); });
  nodes = [];
  connections = [];
  drawConnections();
}

// ── Add Node Button ──────────────────────────────────────────────────
document.getElementById('addNodeBtn').addEventListener('click', function(){
  var type = document.getElementById('nodeTypeSelect').value;
  var wrap = document.getElementById('canvasWrap');
  var x = wrap.scrollLeft + 100 + Math.random() * 200;
  var y = wrap.scrollTop + 100 + Math.random() * 100;
  createNode(type, x, y, '', '');
});

// ── Save / Load ──────────────────────────────────────────────────────
function serialize(){
  return {
    nodes: nodes.map(function(n){
      return {
        id: n.id, type: n.type, bcts: n.bcts,
        x: parseInt(n.el.style.left), y: parseInt(n.el.style.top),
        title: n.el.querySelector('.toc-node-title').textContent,
        desc: n.el.querySelector('.toc-node-desc').textContent,
        indicator: n.el.querySelector('.toc-node-indicator').textContent
      };
    }),
    connections: connections.slice(),
    nodeIdCounter: nodeIdCounter
  };
}

function deserialize(data){
  clearCanvas();
  nodeIdCounter = data.nodeIdCounter || 0;
  var idMap = {};
  (data.nodes||[]).forEach(function(n){
    var node = createNode(n.type, n.x, n.y, n.title, n.desc, n.indicator);
    idMap[n.id] = node.id;
    (n.bcts||[]).forEach(function(bctId){
      var bctName = bctId;
      if (bctData){
        bctData.categories.forEach(function(cat){
          cat.techniques.forEach(function(t){ if(t.id === bctId) bctName = t.name; });
        });
      }
      addBctToNode(node.id, bctId, bctName);
    });
  });
  (data.connections||[]).forEach(function(c){
    connections.push({from: idMap[c.from]||c.from, to: idMap[c.to]||c.to});
  });
  drawConnections();
}

var saveTimer = null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serialize()));
    document.getElementById('saveIndicator').textContent = 'Saved ' + new Date().toLocaleTimeString();
  }, 500);
}

document.getElementById('saveBtn').addEventListener('click', function(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(serialize()));
  document.getElementById('saveIndicator').textContent = 'Saved!';
});

document.getElementById('loadBtn').addEventListener('click', function(){
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { alert('No saved ToC found.'); return; }
  deserialize(JSON.parse(raw));
  document.getElementById('saveIndicator').textContent = 'Loaded!';
});

// Auto-load on page load
document.addEventListener('DOMContentLoaded', function(){
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { deserialize(JSON.parse(raw)); } catch(e){} }
});

// ── Export as PNG ────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', function(){
  // Find bounding box of all nodes
  var minX=Infinity, minY=Infinity, maxX=0, maxY=0;
  nodes.forEach(function(n){
    var x = parseInt(n.el.style.left), y = parseInt(n.el.style.top);
    var w = n.el.offsetWidth, h = n.el.offsetHeight;
    if(x < minX) minX = x;
    if(y < minY) minY = y;
    if(x+w > maxX) maxX = x+w;
    if(y+h > maxY) maxY = y+h;
  });
  if (!nodes.length) { alert('Add some nodes first!'); return; }

  var pad = 40;
  var cw = maxX - minX + pad*2;
  var ch = maxY - minY + pad*2;

  var offCanvas = document.createElement('canvas');
  offCanvas.width = cw * 2; offCanvas.height = ch * 2;
  var ctx = offCanvas.getContext('2d');
  ctx.scale(2, 2);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cw, ch);

  // Draw connections
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 2;
  connections.forEach(function(conn){
    var fromNode = nodes.find(function(n){ return n.id === conn.from; });
    var toNode = nodes.find(function(n){ return n.id === conn.to; });
    if(!fromNode || !toNode) return;
    var x1 = parseInt(fromNode.el.style.left) + fromNode.el.offsetWidth/2 - minX + pad;
    var y1 = parseInt(fromNode.el.style.top) + fromNode.el.offsetHeight - minY + pad;
    var x2 = parseInt(toNode.el.style.left) + toNode.el.offsetWidth/2 - minX + pad;
    var y2 = parseInt(toNode.el.style.top) - minY + pad;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // Arrow
    var angle = Math.atan2(y2-y1, x2-x1);
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 8*Math.cos(angle-0.5), y2 - 8*Math.sin(angle-0.5));
    ctx.lineTo(x2 - 8*Math.cos(angle+0.5), y2 - 8*Math.sin(angle+0.5));
    ctx.closePath(); ctx.fillStyle = '#94a3b8'; ctx.fill();
  });

  // Draw nodes
  var typeColors = {input:'#0EA5E9',activity:'#6366F1',output:'#F59E0B',outcome:'#10B981',impact:'#EC4899',assumption:'#64748b'};
  nodes.forEach(function(n){
    var x = parseInt(n.el.style.left) - minX + pad;
    var y = parseInt(n.el.style.top) - minY + pad;
    var w = n.el.offsetWidth, h = n.el.offsetHeight;
    var color = typeColors[n.type] || '#94a3b8';
    // Card
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke();
    // Header
    ctx.fillStyle = color + '20';
    ctx.beginPath(); ctx.roundRect(x,y,w,24,{upperLeft:8,upperRight:8,lowerLeft:0,lowerRight:0}); ctx.fill();
    ctx.fillStyle = color;
    ctx.font = '600 10px system-ui';
    ctx.fillText(n.type.toUpperCase(), x+8, y+16);
    // Title
    var title = n.el.querySelector('.toc-node-title').textContent;
    ctx.fillStyle = '#1e293b';
    ctx.font = '600 12px system-ui';
    ctx.fillText(title, x+8, y+40, w-16);
    // Desc
    var desc = n.el.querySelector('.toc-node-desc').textContent;
    ctx.fillStyle = '#64748b';
    ctx.font = '11px system-ui';
    ctx.fillText(desc, x+8, y+56, w-16);
  });

  // Watermark
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px system-ui';
  ctx.fillText('Built with ImpactMojo ToC Builder', pad, ch - 10);

  offCanvas.toBlob(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'theory-of-change.png'; a.click();
    URL.revokeObjectURL(url);
  });
});

document.getElementById('toggleSidebar').addEventListener('click', function(){
  document.getElementById('bctSidebar').classList.toggle('open');
});

// ── Keyboard shortcuts ──────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if (e.key === 'Delete' && selectedNode && !e.target.isContentEditable){
    removeNode(selectedNode);
    selectedNode = null;
  }
});
