# CI — broken link checks, pa11y accessibility audit, and HTML validation
# Note: axe-core accessibility testing is handled by accessibility.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  broken-links:
    name: Check broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Broken link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,204,301,302,403
            --exclude-path ./netlify-env-files
            --exclude 'chat.whatsapp.com'
            --exclude 'discord.gg'
            --exclude 't.me'
            --exclude 'localhost'
            --exclude 'impactmojo@ibl'
            '**/*.html'
            '**/*.md'
          fail: false

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: broken-links-report
          path: ./lychee/out.md

  accessibility:
    name: Accessibility audit (pa11y-ci)
    runs-on: ubuntu-latest
    # Scoped permissions: read the repo, write sticky PR comments.
    # Required by the 'Comment on PR with accessibility results' step below,
    # which uses marocchino/sticky-pull-request-comment@v3.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pa11y-ci and http-server
        run: npm install -g pa11y-ci http-server

      - name: Start local server
        run: npx http-server -p 8080 -s &

      - name: Wait for server
        run: sleep 3

      - name: Run pa11y-ci accessibility audit
        id: pa11y
        run: |
          set +e
          # Direct redirection: stdout (JSON) -> file, stderr -> log.
          # Avoids `tee` + `2>&1` which mixes stderr into the JSON file and
          # can corrupt or truncate the output. Also avoids PIPESTATUS pitfalls
          # since there's no pipe — $? is pa11y-ci's exit code directly.
          pa11y-ci --config .pa11yci --json > pa11y-results.json
          PA11Y_EXIT=$?
          echo "pa11y-results.json size: $(wc -c < pa11y-results.json) bytes"
          # Extract summary from JSON output for the report.
          # pa11y-ci --json emits a single top-level JSON object to stdout, but
          # `2>&1 | tee` mixes stderr (status messages) into the same file. We
          # use depth-counted brace walking to extract the first balanced JSON
          # object instead of relying on indexOf/lastIndexOf which break when
          # there's extra output before/after the JSON.
          node -e "
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('pa11y-results.json', 'utf8');
              const start = raw.indexOf('{');
              if (start === -1) {
                fs.writeFileSync('pa11y-report.md', '## Accessibility Audit Results\n\nNo JSON output produced. Check workflow logs.\n');
                process.exit(0);
              }
              // Walk forward from the first { counting depth, respecting strings
              let depth = 0, end = -1, inString = false, escape = false;
              for (let i = start; i < raw.length; i++) {
                const c = raw[i];
                if (escape) { escape = false; continue; }
                if (c === '\\\\') { escape = true; continue; }
                if (c === '\"') { inString = !inString; continue; }
                if (inString) continue;
                if (c === '{') depth++;
                else if (c === '}') {
                  depth--;
                  if (depth === 0) { end = i; break; }
                }
              }
              if (end === -1) {
                fs.writeFileSync('pa11y-report.md', '## Accessibility Audit Results\n\nIncomplete JSON output. Check workflow logs.\n');
                process.exit(0);
              }
              const data = JSON.parse(raw.slice(start, end + 1));
              let md = '## Accessibility Audit Results (WCAG 2.1 AA)\n\n';
              const total = data.total || 0;
              const passes = data.passes || 0;
              const errors = data.errors || 0;
              md += '| Metric | Count |\n|--------|-------|\n';
              md += '| Pages tested | ' + total + ' |\n';
              md += '| Pages passed | ' + passes + ' |\n';
              md += '| Pages with errors | ' + errors + ' |\n\n';
              if (data.results) {
                for (const [url, issues] of Object.entries(data.results)) {
                  if (issues.length > 0) {
                    const page = url.replace('http://localhost:8080/', '');
                    md += '<details><summary>' + page + ' (' + issues.length + ' issues)</summary>\n\n';
                    issues.forEach(i => {
                      md += '- **' + i.type + '**: ' + i.message + '\n';
                      if (i.selector) md += '  - Selector: \`' + i.selector + '\`\n';
                    });
                    md += '\n</details>\n\n';
                  }
                }
              }
              if (errors > 0) {
                md += '> **Note:** Critical WCAG 2.1 AA violations detected. Please fix before merging.\n';
              } else {
                md += '> All pages passed accessibility checks.\n';
              }
              fs.writeFileSync('pa11y-report.md', md);
            } catch(e) {
              // Surface the actual error so we can debug parser failures.
              const msg = (e && e.message) ? e.message : String(e);
              fs.writeFileSync('pa11y-report.md', '## Accessibility Audit Results\n\nFailed to parse results: ' + msg + '\n\nSee workflow logs for details.\n');
              console.error('parser error:', msg);
            }
          "
          echo "exit_code=$PA11Y_EXIT" >> "$GITHUB_OUTPUT"

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-report
          path: |
            pa11y-report.md
            pa11y-results.json

      - name: Comment on PR with accessibility results
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: accessibility-audit
          path: pa11y-report.md

      - name: Fail on critical violations
        if: steps.pa11y.outputs.exit_code != '0'
        run: |
          echo "::error::Accessibility audit failed with critical WCAG 2.1 AA violations."
          exit 1

  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate key pages
        run: |
          html-validate \
            --config '{"extends":["html-validate:recommended"],"rules":{"no-inline-style":"off","no-trailing-whitespace":"off","attribute-boolean-style":"off","element-permitted-content":"off","heading-level":"off"}}' \
            index.html login.html signup.html premium.html about.html || true
