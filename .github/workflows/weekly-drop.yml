# Weekly content drop — runs every Monday at 07:00 IST (= 01:30 UTC).
#
# Calls Claude Code headless with /weekly-drop, commits the generated
# brief + blog draft + video pack to a new weekly-drop/<slug> branch,
# and opens a PR for human review. Nothing is auto-published.
#
# Required secret: ANTHROPIC_API_KEY
# Optional input:  topic (manual run only)

name: Weekly Drop

on:
  schedule:
    - cron: '30 1 * * 1'   # Mon 01:30 UTC = 07:00 IST
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional topic (e.g. "gender-budgeting"). Leave blank to auto-pick.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-drop
  cancel-in-progress: false

jobs:
  generate:
    name: Generate weekly drop
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run /weekly-drop (CI mode — no interactive prompts, no paid APIs)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_ARG: ${{ github.event.inputs.topic }}
        run: |
          set -euo pipefail
          PROMPT="/weekly-drop ${TOPIC_ARG}

          CI MODE: Skip step 9's interactive promotion menu. Do NOT call any paid
          APIs (napkin.ai, sarvam, elevenlabs) — leave only configs/prompts ready.
          When done, print one line: WEEKLY_DROP_SLUG=<the slug you created>"

          claude -p "$PROMPT" \
            --output-format stream-json \
            --permission-mode acceptEdits \
            2>&1 | tee claude-run.log

          # Extract the slug Claude reports
          SLUG=$(grep -oP 'WEEKLY_DROP_SLUG=\K[a-z0-9-]+' claude-run.log | tail -1)
          if [[ -z "$SLUG" ]]; then
            # Fallback: pick the most recently created folder
            SLUG=$(ls -t WeeklyDrops/ 2>/dev/null | head -1)
          fi
          if [[ -z "$SLUG" ]]; then
            echo "::error::No drop folder was produced. Check claude-run.log."
            exit 1
          fi
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          echo "Drop slug: $SLUG"

      - name: Commit drop to a new branch
        run: |
          set -euo pipefail
          BRANCH="weekly-drop/${SLUG}"
          git config user.name  "ImpactMojo Bot"
          git config user.email "bot@impactmojo.in"
          git checkout -b "$BRANCH"
          # WeeklyDrops/ is gitignored on main — force-add the produced folder.
          git add -f "WeeklyDrops/${SLUG}/"
          git commit -m "content: weekly drop — ${SLUG}

          Auto-generated by /weekly-drop on $(date -u +%Y-%m-%dT%H:%MZ).
          Review brief.md, blog-draft.html, and video/script.md before
          promoting. No paid APIs were called — illustration / narration
          assets are prompt-only at this stage."
          git push -u origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open review PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Weekly drop: ${SLUG}" \
            --label weekly-drop \
            --body "$(cat <<EOF
          Auto-generated by \`.github/workflows/weekly-drop.yml\`.

          ### Review checklist
          - [ ] Read \`WeeklyDrops/${SLUG}/brief.md\` (synthesis + sources + cross-links)
          - [ ] Open \`WeeklyDrops/${SLUG}/blog-draft.html\` in a browser
          - [ ] Skim \`WeeklyDrops/${SLUG}/video/script.md\` for tone + factual accuracy
          - [ ] Run the \`fact-check\` skill on the blog draft and the video script
          - [ ] Verify all 3 source URLs in \`brief.md\` resolve (200)

          ### Promotion options (after review)
          1. **Merge as-is** — drop ships into main as a draft for you to promote later
          2. **Promote the blog now** — run the \`add-files\` skill to wire it into \`Blog/\`, \`blog.html\`, and \`data/search-index.json\`
          3. **Generate paid assets** — napkin illustrations (~\$0.25), Sarvam audio (~\$1.50), ElevenLabs (~\$0.30)
          4. **Reject** — close PR, drop is gone (history preserved on this branch)

          ### Notes
          - No paid APIs were called during generation. Configs are ready in \`narration.md\`, \`illustrations/prompts.md\`.
          - Cron next runs: Monday 07:00 IST.
          - Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          EOF
          )"

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-run-log-${{ env.SLUG }}
          path: claude-run.log
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          {
            echo "## Weekly Drop"
            if [[ -n "${SLUG:-}" ]]; then
              echo ""
              echo "- **Slug:** \`${SLUG}\`"
              echo "- **Branch:** \`${BRANCH:-(not created)}\`"
              echo "- **Folder:** \`WeeklyDrops/${SLUG}/\`"
            else
              echo ""
              echo "Generation failed — see the run log artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
