<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImpactMojo — Handouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --im-bg: #f6f9ff;
      --im-panel: #ffffff;
      --im-card: #ffffff;
      --im-border: #dbe6ff;
      --im-text: #0b1220;
      --im-muted: #4b6086;
      --im-brand: #2b6bff;
      --im-accent: #7c5cff;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 16px;
    }
    .dark{
      --im-bg: #0b1220;
      --im-panel: #111a2d;
      --im-card: #0f1526;
      --im-border: #1e2a44;
      --im-text: #e6ecff;
      --im-muted: #9bb0d6;
      --im-brand: #2bb0ff;
      --im-accent: #7c5cff;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--im-text);background:var(--im-bg);transition:background .3s ease, color .3s ease}
    a{color:var(--im-brand); text-decoration:none}
    a:hover{text-decoration:underline}
    header{position:sticky;top:0;z-index:40;backdrop-filter:saturate(1.1) blur(8px);background:var(--im-panel);border-bottom:1px solid var(--im-border)}
    .wrap{max-width:1100px;margin:0 auto;padding:14px 18px}
    .headbar{display:flex;gap:14px;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center;font-weight:700;letter-spacing:.2px}
    .brand-badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--im-brand),var(--im-accent));display:grid;place-items:center;color:white;box-shadow:var(--shadow)}
    .brand-badge span{font-size:18px;font-weight:800}
    .sub{color:var(--im-muted);font-size:13px;margin-top:2px}
    .navlinks{display:flex;gap:10px;align-items:center}
    .home-link{padding:8px 10px;border:1px solid var(--im-border);border-radius:10px;text-decoration:none;color:var(--im-text);background:var(--im-panel)}
    .home-link:hover{background:#f2f6ff}
    .toggle{display:inline-flex;align-items:center;gap:8px}
    .toggle button{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;border:1px solid var(--im-border);background:var(--im-panel);color:var(--im-text);cursor:pointer}
    .toggle button:hover{background:#eef3ff}
    .panel{margin:18px 0 24px;background:var(--im-panel);border:1px solid var(--im-border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;padding:16px 18px}
    .search{flex:1 1 320px;display:flex;align-items:center;gap:10px;background:var(--im-card);border:1px solid var(--im-border);border-radius:12px;padding:10px 12px}
    .search input{background:transparent;border:none;outline:none;color:var(--im-text);font-size:14px;width:100%}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:12px 18px 20px}
    .card{background:var(--im-card);border:1px solid var(--im-border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);min-height:160px}
    .card:hover{outline:2px solid #b7cdfc}
    .title{font-weight:700;font-size:16px;line-height:1.35}
    .desc{color:var(--im-muted);font-size:13px;line-height:1.45}
    .empty{padding:24px 20px;color:var(--im-muted)}
    .hidden{display:none !important}
    .tag{font-size:11px;color:var(--im-muted);border:1px dashed var(--im-border);padding:2px 6px;border-radius:999px;margin-right:6px}
    footer{color:var(--im-muted);font-size:12px;text-align:center;padding:30px 0 60px}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(43,176,255,.35);border-top-color:#2bb0ff;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header>
    <div class="wrap headbar">
      <div class="brand">
        <a class="home-link" href="/">← Home</a>
        <div class="brand-badge"><span>IM</span></div>
        <div>
          <div>ImpactMojo</div>
          <div class="sub">Handouts — HTML pages displayed directly in cards</div>
        </div>
      </div>
      <div class="navlinks">
        <div class="toggle" title="Toggle theme">
          <button id="themeBtn" aria-label="Toggle theme">
            <svg id="sun" width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"/><g stroke="currentColor"><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
            <svg id="moon" width="18" height="18" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="panel">
    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" fill="none"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor"/></svg>
        <input id="q" type="search" placeholder="Search folders…">
      </div>
    </div>

    <div id="grid" class="grid" aria-live="polite"></div>
    <div id="empty" class="empty hidden">No matches. Try a different keyword.</div>
    <div class="empty" id="loading"><span class="spinner"></span> Loading handouts…</div>
  </main>

  <footer>© ImpactMojo</footer>

  <script>
    (function(){
      const root = document.documentElement;
      function systemPref(){ try { return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch(_) { return 'light'; } }
      function getSaved(){ return localStorage.getItem('im-theme') || localStorage.getItem('theme') || (root.classList.contains('dark') ? 'dark' : null); }
      function apply(theme){
        const t = theme || getSaved() || systemPref();
        if (t === 'dark') root.classList.add('dark'); else root.classList.remove('dark');
        document.getElementById('sun').style.display = root.classList.contains('dark') ? 'none' : 'block';
        document.getElementById('moon').style.display = root.classList.contains('dark') ? 'block' : 'none';
        try { localStorage.setItem('im-theme', root.classList.contains('dark') ? 'dark' : 'light'); } catch(_) {}
      }
      apply();
      document.getElementById('themeBtn').addEventListener('click', ()=>{ root.classList.toggle('dark'); apply(root.classList.contains('dark') ? 'dark' : 'light'); });
      try { matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>apply()); } catch(_) {}
      window.addEventListener('storage', (e)=>{ if (e.key === 'im-theme' || e.key === 'theme') apply(e.newValue); });
    })();

    const OWNER="Varnasr", REPO="ImpactMojo", BRANCH="main", ROOT_DIR="Handouts";
    const elGrid=document.getElementById('grid'), elEmpty=document.getElementById('empty'), elLoad=document.getElementById('loading'), q=document.getElementById('q');

    function escapeHTML(str){ const map={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}; return String(str).replace(/[&<>"']/g,c=>map[c]); }
    function ext(path){ const p=path.toLowerCase(); if(p.endsWith('.html')||p.endsWith('.htm'))return 'html'; if(p.endsWith('.md'))return 'md'; if(p.endsWith('.pdf'))return 'pdf'; if(/\.(png|jpe?g|gif|svg|webp)$/i.test(p))return 'image'; return 'other'; }
    // Use GitHub Pages (your domain) so HTML renders, not raw GitHub which shows code
// Use raw.githack.com so HTML/PDF/Images are served with correct Content-Type and render directly
const rawURL = (path) => {
  const p = String(path).replace(/^\/?/, '');
  // Example: https://raw.githack.com/Varnasr/ImpactMojo/main/Handouts/.../file.html
  return `https://raw.githack.com/${OWNER}/${REPO}/${BRANCH}/${p}`;
};

    function renderCards(groups){
      elLoad.classList.add('hidden');
      const term=(q.value||'').trim().toLowerCase();
      const items=Object.values(groups).filter(g=>!term || g.title.toLowerCase().includes(term));
      if(!items.length){ elGrid.innerHTML=''; elEmpty.classList.remove('hidden'); return; }
      elEmpty.classList.add('hidden');
      elGrid.innerHTML=items.map(g=>{
        const htmlFiles = g.files.filter(f=>f.type==='html');
        const otherCount = g.files.length - htmlFiles.length;
        
        // Build HTML pages list directly in the card
        let pagesHTML = '';
        if(htmlFiles.length > 0){
          pagesHTML = `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--im-border)">
            ${htmlFiles.map(f=>`<a href="${rawURL(f.path)}" target="_blank" rel="noopener" 
              style="display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;
              border:1px solid var(--im-border);border-radius:8px;background:rgba(43,107,255,.03);
              color:var(--im-text);text-decoration:none;font-size:13px;font-weight:500;
              transition:all .2s ease"
              onmouseover="this.style.background='rgba(43,107,255,.08)';this.style.borderColor='var(--im-brand)'"
              onmouseout="this.style.background='rgba(43,107,255,.03)';this.style.borderColor='var(--im-border)'">
              <svg width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" fill="none"/>
                <polyline points="14 2 14 8 20 8" stroke="currentColor" fill="none"/>
              </svg>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHTML(f.title)}</span>
            </a>`).join('')}
          </div>`;
        }
        
        const countText = htmlFiles.length ? 
          `${htmlFiles.length} HTML page${htmlFiles.length!==1?'s':''}${otherCount?` + ${otherCount} other file${otherCount!==1?'s':''}`:''}`
          : `${otherCount} file${otherCount!==1?'s':''} (no HTML pages)`;
        
        const chips = g.subs.length ? g.subs.slice(0,3).map(s=>`<span class="tag">${escapeHTML(s)}</span>`).join('') : '';
        
        return `<article class="card" style="cursor:default">
          <div class="title">${escapeHTML(g.title)}</div>
          <div class="desc">${escapeHTML(countText)}</div>
          ${chips}
          ${pagesHTML}
        </article>`;
      }).join('');
    }

    document.addEventListener('click',(e)=>{
      // No modal functionality needed - pages are shown directly in cards
    });
    q.addEventListener('input',()=>renderCards(window.__GROUPS__||{}));

    async function load(){
      try{
        const brRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/branches/${BRANCH}`);
        if(!brRes.ok) throw new Error('Branch fetch failed: '+brRes.status);
        const br = await brRes.json();
        const treeSha = br.commit?.commit?.tree?.sha || br.commit?.sha;
        if(!treeSha) throw new Error('Could not resolve tree SHA');
        const treeRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${treeSha}?recursive=1`);
        if(!treeRes.ok) throw new Error('Tree fetch failed: '+treeRes.status);
        const tree = await treeRes.json();
        const systemFiles = /\.(ds_store|gitkeep|gitignore)$/i;
        const files = (tree.tree||[]).filter(n=>{
          if(n.type!=='blob') return false;
          if(!n.path.startsWith(`${ROOT_DIR}/`)) return false;
          const name = n.path.split('/').pop();
          if(systemFiles.test(name) || name.startsWith('.') || name.toLowerCase()==='thumbs.db') return false;
          return true;
        });
        const groups = {};
        files.forEach(n=>{
          const type = ext(n.path);
          const name = n.path.split('/').pop();
          const relative = n.path.replace(`${ROOT_DIR}/`,'');
          const parts = relative.split('/');
          // Skip files directly in ROOT (not in a subfolder)
          if(parts.length <= 1) return;
          const gkey = parts[0];
          if(!groups[gkey]) groups[gkey]={ title: gkey, subs: new Set(), files: [] };
          const subparts = parts.slice(1,-1);
          subparts.forEach(s=>groups[gkey].subs.add(s));
          groups[gkey].files.push({ title: name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' '), path: n.path, type });
        });
        Object.values(groups).forEach(g=>g.subs=[...g.subs]);
        window.__GROUPS__ = groups;
        renderCards(groups);
      }catch(e){
        elLoad.classList.remove('hidden');
        elLoad.textContent = 'Error loading handouts: ' + (e.message||e);
        console.error(e);
      }
    }

    document.addEventListener('click',(e)=>{
      // Pages are shown directly in cards - no modal needed
    });
    q.addEventListener('input',()=>renderCards(window.__GROUPS__||{}));

    load();
  </script>
</body>
</html>
