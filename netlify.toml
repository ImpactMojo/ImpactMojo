[build]
  # Update version.json on every deploy so auto-refresh detects changes
  command = "echo '{\"v\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\"}' > version.json"
  publish = "."
  functions = "netlify/functions"

# HTML pages — short edge cache so TTFB drops from ~1.4s to <100ms on
# repeat hits. must-revalidate + Netlify's auto-cache-purge on deploy
# means visitors still see fresh content within seconds of a push.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Long cache for static assets — images, logos, favicons rarely change.
# Browsers will still revalidate via ETag if Netlify regenerates them.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# CSS files (custom stylesheets, not inline) — same revalidation pattern as JS
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Short cache for JS/CSS so updates propagate quickly
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/Games/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# 101 courses — clean URLs without .html extension
[[redirects]]
  from = "/101-courses/:slug"
  to = "/101-courses/:slug.html"
  status = 200
  force = false

# Cache 101 course HTML files (5 min)
[[headers]]
  for = "/101-courses/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Documentation — self-hosted Docsify (SPA fallback)
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/docs/*"
  to = "/docs/index.html"
  status = 200
  force = false
