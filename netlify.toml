[build]
  # Update version.json on every deploy so auto-refresh detects changes
  command = "echo '{\"v\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\"}' > version.json"
  publish = "."

# Short cache for JS/CSS so updates propagate quickly
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/Games/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# 101 courses — clean URLs without .html extension
[[redirects]]
  from = "/101-courses/:slug"
  to = "/101-courses/:slug.html"
  status = 200
  force = false

# Cache 101 course HTML files (5 min)
[[headers]]
  for = "/101-courses/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Proxy Gamma slide embeds through our domain (hides gamma.app origin)
[[redirects]]
  from = "/slides/*"
  to = "https://gamma.app/embed/:splat"
  status = 200
  force = true

# GitBook documentation — 200 proxy rewrite avoids redirect loops
[[redirects]]
  from = "/docs"
  to = "https://impactmojo.gitbook.io/impactmojo/"
  status = 200
  force = true

[[redirects]]
  from = "/docs/*"
  to = "https://impactmojo.gitbook.io/impactmojo/:splat"
  status = 200
  force = true
