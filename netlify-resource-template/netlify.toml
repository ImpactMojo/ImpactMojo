# netlify.toml — drop this into each premium resource Netlify site.
#
# Required environment variables (set in Netlify dashboard):
#   RESOURCE_TOKEN_SECRET  — shared HMAC signing secret
#   RESOURCE_ID            — unique resource slug (e.g. "poa", "mel")

[build]
  publish = "."            # adjust if your built site is in a subdirectory

[[edge_functions]]
  path   = "/*"
  function = "auth-gate"
