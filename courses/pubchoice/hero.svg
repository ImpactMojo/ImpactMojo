  <!-- Decision tree: root at top centre, branching downward across four layers. -->
  <!-- Connections drawn first so nodes sit on top. -->
  <g stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2" fill="none">
    <!-- Root to layer 2 -->
    <path d="M 400 90 Q 400 130 270 170"/>
    <path d="M 400 90 L 400 170"/>
    <path d="M 400 90 Q 400 130 530 170"/>
    <!-- Layer 2 to layer 3 -->
    <path d="M 270 170 Q 270 210 180 250"/>
    <path d="M 270 170 Q 270 210 360 250"/>
    <path d="M 400 170 L 400 250"/>
    <path d="M 530 170 Q 530 210 460 250"/>
    <path d="M 530 170 Q 530 210 620 250"/>
    <!-- Layer 3 to layer 4 -->
    <path d="M 180 250 Q 180 290 130 330" stroke-opacity="0.22"/>
    <path d="M 180 250 Q 180 290 230 330" stroke-opacity="0.22"/>
    <path d="M 360 250 L 320 330" stroke-opacity="0.22"/>
    <path d="M 360 250 L 400 330" stroke-opacity="0.22"/>
    <path d="M 400 250 L 480 330" stroke-opacity="0.22"/>
    <path d="M 460 250 L 450 330" stroke-opacity="0.22"/>
    <path d="M 620 250 Q 620 290 570 330" stroke-opacity="0.22"/>
    <path d="M 620 250 Q 620 290 670 330" stroke-opacity="0.22"/>
    <!-- Layer 4 to layer 5 (terminal outcomes) -->
    <path d="M 130 330 L 110 410" stroke-opacity="0.15"/>
    <path d="M 230 330 L 250 410" stroke-opacity="0.15"/>
    <path d="M 320 330 L 310 410" stroke-opacity="0.15"/>
    <path d="M 400 330 L 390 410" stroke-opacity="0.15"/>
    <path d="M 480 330 L 510 410" stroke-opacity="0.15"/>
    <path d="M 570 330 L 580 410" stroke-opacity="0.15"/>
    <path d="M 670 330 L 690 410" stroke-opacity="0.15"/>
  </g>

  <!-- Root node (gold, large) -->
  <circle cx="400" cy="90" r="22" fill="#B45309"/>
  <circle cx="400" cy="90" r="14" fill="#F59E0B"/>

  <!-- Layer 2 nodes -->
  <circle cx="270" cy="170" r="14" fill="#FFFFFF"/>
  <circle cx="400" cy="170" r="14" fill="#F59E0B"/>
  <circle cx="530" cy="170" r="14" fill="#FFFFFF"/>

  <!-- Layer 3 nodes -->
  <circle cx="180" cy="250" r="11" fill="#E0E7FF"/>
  <circle cx="360" cy="250" r="11" fill="#FFFFFF"/>
  <circle cx="400" cy="250" r="11" fill="#F59E0B"/>
  <circle cx="460" cy="250" r="11" fill="#E0E7FF"/>
