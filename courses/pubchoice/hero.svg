    <circle cx="570" cy="330" r="8"/>
    <circle cx="670" cy="330" r="8"/>
  </g>

  <!-- Layer 5 nodes (terminal outcomes, smallest) -->
  <g fill="#94A3B8" opacity="0.7">
    <circle cx="110" cy="410" r="5"/>
    <circle cx="250" cy="410" r="5"/>
    <circle cx="310" cy="410" r="5"/>
    <circle cx="390" cy="410" r="5"/>
    <circle cx="510" cy="410" r="5"/>
    <circle cx="580" cy="410" r="5"/>
    <circle cx="690" cy="410" r="5"/>
  </g>

  <!-- Caption -->
  <text x="400" y="468" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="2">
