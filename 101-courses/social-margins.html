<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Social Margins 101 - Free development education course by ImpactMojo">
  <title>Social Margins 101 | ImpactMojo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
      background: #1a1a1a; color: #fff; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px; font-size: 14px;
    }
    .header-logo { font-weight: 600; font-size: 16px; white-space: nowrap; }
    .header-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-weight: 400; font-size: 14px; white-space: nowrap;
      max-width: 60%; overflow: hidden; text-overflow: ellipsis; text-align: center;
    }
    .header-back {
      color: #aaa; text-decoration: none; font-size: 13px; white-space: nowrap;
      transition: color 0.2s;
    }
    .header-back:hover { color: #fff; }
    .embed-frame {
      position: fixed; top: 48px; left: 0; right: 0; bottom: 32px;
      border: none; width: 100%; height: calc(100vh - 80px);
    }
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 32px; z-index: 100;
      background: #1a1a1a; color: #999; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px; font-size: 11px;
    }
    .footer a { color: #999; text-decoration: none; }
    .footer a:hover { color: #ccc; }
    @media (max-width: 600px) {
      .header-title { font-size: 12px; max-width: 50%; }
      .header { padding: 0 12px; }
      .footer { padding: 0 12px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <span class="header-logo">ImpactMojo</span>
    <span class="header-title">Social Margins 101</span>
    <a href="/catalog.html" class="header-back">Back to Courses</a>
  </header>
  <iframe class="embed-frame" src="https://gamma.app/embed/an2qeykh381uf18" 
    allow="fullscreen" allowfullscreen loading="lazy"
    title="Social Margins 101 - ImpactMojo"></iframe>
  <footer class="footer">
    <span><a href="https://www.impactmojo.in">www.impactmojo.in</a></span>
    <span>CC BY-NC-SA 4.0</span>
    <span>ImpactMojo 101 Series</span>
  </footer>

<!-- Supabase Auth -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1"></script>
<script src="/js/state-manager.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
