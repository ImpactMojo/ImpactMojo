<style>
:root{--bg:#0F172A;--bg2:#0B1428;--card:#0B1222;--muted:#0A1020;--text:#E6EDF7;--sub:#9FB1C9;--b:#1D2A44;--accent:#2CC7FF;--accent2:#7C8CFF;--chip:#0F1B33;--chip-b:#24324F;--card-grad-end:#0A1424;--header-bg:rgba(7,12,23,.7);--nav-text:#E6EDF7}
.light{--bg:#FFFFFF;--bg2:#F5F7FA;--card:#FFFFFF;--muted:#F0F2F5;--text:#1F2937;--sub:#6B7280;--b:#E5E7EB;--accent:#0EA5E9;--accent2:#3B82F6;--chip:#EFF6FF;--chip-b:#DBEAFE;--card-grad-end:#F9FAFB;--header-bg:rgba(255,255,255,0.95);--nav-text:#1F2937}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
a{color:inherit;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 1rem}
.header{position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);z-index:40}
.nav{display:flex;justify-content:space-between;align-items:center;padding:.9rem 0}
.brand{font-family:Poppins,sans-serif;font-weight:800;letter-spacing:.2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav a{margin-right:1rem;font-weight:600}
.theme-toggle{background:transparent;border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:1rem;margin-left:1rem;display:flex;align-items:center;justify-content:center;width:40px;height:40px}
.theme-toggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.theme-toggle:hover{border-color:var(--accent)}
.hero{padding:28px 0 10px}
.hero h1{font-family:Poppins,sans-serif;font-size:1.9rem;margin:0;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.controls{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin:14px 0 18px}
.control{display:flex;align-items:center;gap:.5rem;background:var(--muted);border:1px solid var(--b);border-radius:12px;padding:.55rem .7rem}
.control input{background:transparent;border:none;outline:none;color:var(--text);min-width:280px}
.control input::placeholder{color:var(--sub)}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:var(--chip);border:1px solid var(--chip-b);border-radius:999px;padding:.26rem .65rem;font-size:.82rem;color:var(--sub);cursor:pointer;user-select:none;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(44,199,255,.1)}
.select{border:1px solid var(--b);border-radius:12px;background:var(--muted);color:var(--text);padding:.5rem .6rem;cursor:pointer;transition:border-color .15s}
.select:hover{border-color:var(--accent)}
.count{color:var(--sub);font-size:.92rem;margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.card{background:linear-gradient(180deg,var(--card),var(--card-grad-end));border:1px solid var(--b);border-radius:16px;padding:14px;transition:transform .15s,border-color .15s;cursor:pointer}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card-title{font-weight:700;margin:0 0 .2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.35rem}
.badge{border:1px solid var(--chip-b);border-radius:999px;padding:.12rem .55rem;font-size:.72rem;color:var(--sub);display:inline-block}
.badge.type-course{border-color:#60A5FA33;color:#A9C9FF}
.badge.type-lab{border-color:#34D39933;color:#8CF6CF}
.badge.type-game{border-color:#F59E0B33;color:#FFD59E}
.badge.type-premium{border-color:#F472B633;color:#FFB5E4}
.badge.type-resource{border-color:#A78BFA33;color:#CFB5FF}
.badge.level-intro{border-color:#22D3EE33;color:#8FEFFF}
.badge.level-core{border-color:#94A3B833;color:#AAB7CC}
.badge.level-advanced{border-color:#EF444433;color:#FF9C9C}
.badge.type-track{border-color:#60A5FA33;color:#A9C9FF;font-size:.68rem}
.desc{color:var(--sub);font-size:.9rem;margin:.15rem 0 .4rem;min-height:1.2em;line-height:1.4}
.quote{color:var(--sub);font-size:.85rem;margin:.4rem 0 .2rem 0;padding-left:.5rem;border-left:2px solid var(--accent);font-style:italic;line-height:1.3}
.stars{display:inline-flex;gap:2px;vertical-align:middle}
.star{width:14px;height:14px;display:inline-block}
.star svg{width:14px;height:14px}
.rating-row{display:flex;align-items:center;gap:.3rem;margin-bottom:.2rem}
.users{border:1px solid var(--chip-b);border-radius:999px;padding:.06rem .45rem;font-size:.72rem;color:var(--sub);display:inline-flex;align-items:center;gap:.3rem;margin-left:.4rem}
.users svg{width:14px;height:14px}
.item-link{display:inline-block;margin-top:.2rem;color:var(--text);font-weight:600;padding:.2rem .4rem;border-radius:4px;transition:background .15s}
.item-link:hover{color:var(--accent);background:rgba(44,199,255,.1)}
.footer{border-top:1px solid var(--b);padding:1rem 0;color:var(--sub);margin-top:20px;font-size:.9rem}
</style>
</head>

<script>
// Parse JSON safely from embedded script tag
const parsed = JSON.parse(document.getElementById('imx-data').textContent);
const DATA = parsed.DATA || [];
const META = parsed.META || {};

// Theme management - sophisticated version with system preference detection and sync
(function(){
  const root = document.documentElement;
  function systemPref(){ try { return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch(_) { return 'dark'; } }
  function getSaved(){ return localStorage.getItem('imx-theme') || (root.classList.contains('light') ? 'light' : root.classList.contains('dark') ? 'dark' : null); }
  function apply(theme){
    const t = theme || getSaved() || systemPref();
    if (t === 'light') {
      root.classList.remove('dark');
      root.classList.add('light');
    } else {
      root.classList.remove('light');
      root.classList.add('dark');
    }
    document.getElementById('sun').style.display = root.classList.contains('light') ? 'block' : 'none';
    document.getElementById('moon').style.display = root.classList.contains('light') ? 'none' : 'block';
    try { localStorage.setItem('imx-theme', root.classList.contains('light') ? 'light' : 'dark'); } catch(_) {}
  }
  apply();
  document.getElementById('themeToggle').addEventListener('click', ()=>{
    if (root.classList.contains('light')) {
      root.classList.remove('light');
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
      root.classList.add('light');
    }
    apply(root.classList.contains('light') ? 'light' : 'dark');
  });
  try { matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>apply()); } catch(_) {}
  window.addEventListener('storage', (e)=>{ if (e.key === 'imx-theme') apply(e.newValue); });
})();

function applyTheme(theme) {
  // Legacy function kept for compatibility but no longer used
  console.log('Using new theme system');
}

// Star rendering
function starRow(r) {
  if (r == null) return '';
  const full = Math.floor(r), half = (r - full) >= 0.5 ? 1 : 0, empty = 5 - full - half;
  const svg = k => {
    if (k === 'full') return '<span class="star"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></span>';
    if (k === 'half') return '<span class="star"><svg viewBox="0 0 24 24"><defs><linearGradient id="g"><stop offset="50%" stop-color="currentColor"/><stop offset="50%" stop-color="transparent"/></linearGradient></defs><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="url(#g)" stroke="currentColor"/></svg></span>';
    return '<span class="star"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></span>';
  };
  return '<span class="stars">' + Array(full).fill(0).map(() => svg('full')).join('') + (half ? svg('half') : '') + Array(empty).fill(0).map(() => svg('empty')).join('') + '</span>';
}

// Card rendering
function card(it) {
  const m = META[it.title] || {};
  const tcls = 'type-' + (it.type || '').toLowerCase();
  const lcls = 'level-' + (it.level || '').toLowerCase();
  const desc = m.desc ? '<div class="desc">' + m.desc + '</div>' : '';
  
  let rating_html = '';
  if (m.rating != null) {
    const stars = starRow(m.rating);
    const count = m.reviews ? ' (' + m.reviews + ' reviews)' : '';
    rating_html = '<div class="rating-row">' + stars + '<span style="font-size:.82rem;color:#A7B7D0">' + Number(m.rating).toFixed(1) + count + '</span>';
    if (m.users) rating_html += '<span class="users"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 11c1.66 0 3-1.79 3-4s-1.34-4-3-4-3 1.79-3 4 1.34 4 3 4zM8 11c1.66 0 3-1.79 3-4S9.66 3 8 3 5 4.79 5 7s1.34 4 3 4zM8 13c-2.67 0-8 1.34-8 4v3h10v-3c0-2.66-4.33-4-2-4zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.95 1.97 3.45v3H24v-3c0-2.66-5.33-4-8-4z"/></svg>' + m.users + '</span>';
    rating_html += '</div>';
  }
  
  const quote = m.quote ? '<div class="quote">"' + m.quote + '"</div>' : '';
  
  return '<div class="card" data-type="' + (it.type || '') + '" data-track="' + (it.track || '') + '" data-level="' + (it.level || '') + '">' +
    '<h3 class="card-title" title="' + it.title.replace(/"/g, '&quot;') + '">' + it.title + '</h3>' +
    '<div class="meta">' +
      '<span class="badge ' + tcls + '">' + (it.type || '') + '</span>' +
      (it.level ? '<span class="badge ' + lcls + '">' + it.level + '</span>' : '') +
      '<span class="badge type-track">' + (it.track || '') + '</span>' +
    '</div>' +
    desc + rating_html + quote +
    '<div><a class="item-link" href="' + it.link + '" target="_blank">Open →</a></div>' +
  '</div>';
}

// Render grid
function render(list) {
  document.getElementById('grid').innerHTML = list.map(card).join('');
  document.getElementById('count').textContent = list.length + ' items';
}

// Get active filters
function getActive(id, attr) {
  return Array.from(document.getElementById(id).querySelectorAll('.chip.active')).map(c => c.getAttribute(attr));
}

// Apply all filters
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const types = getActive('typeChips', 'data-type');
  const tracks = getActive('trackChips', 'data-track');
  const levels = getActive('levelChips', 'data-level');
  const sort = document.getElementById('sort').value;
  
  let out = DATA.filter(it => {
    if (q && !((it.title + ' ' + (it.type || '') + ' ' + (it.track || '')).toLowerCase().includes(q))) return false;
    if (types.length && !types.includes(it.type)) return false;
    if (tracks.length && !tracks.includes(it.track)) return false;
    if (levels.length && !levels.includes(it.level)) return false;
    return true;
  });
  
  if (sort === 'az') out.sort((a, b) => a.title.localeCompare(b.title));
  if (sort === 'za') out.sort((a, b) => b.title.localeCompare(a.title));
  if (sort === 'level') out.sort((a, b) => {
    const lvl = { 'Intro': 0, 'Core': 1, 'Advanced': 2 };
    return (lvl[a.level] || 1) - (lvl[b.level] || 1) || a.title.localeCompare(b.title);
  });
  if (sort === 'type') out.sort((a, b) => a.type.localeCompare(b.type) || a.title.localeCompare(b.title));
  
  render(out);
}

// Event listeners
document.getElementById('search').addEventListener('input', applyFilters);

for (const id of ['typeChips', 'trackChips', 'levelChips']) {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    chip.classList.toggle('active');
    applyFilters();
  });
}

document.getElementById('sort').addEventListener('change', applyFilters);

// URL param support
(function() {
  const p = new URLSearchParams(location.search);
  let t = p.get('track') || (location.hash || '').replace('#', '');
  if (t) {
    t = t.replace(/-/g, ' ').replace(/\band\b/, '&').replace(/\s+/g, ' ').trim();
    const map = {
      'data analysis': 'Data Analysis',
      'gender studies': 'Gender Studies',
      'policy and economics': 'Policy & Economics',
      'research methods': 'Research Methods'
    };
    const label = map[(t || '').toLowerCase()] || t;
    document.querySelectorAll('#trackChips .chip').forEach(ch => {
      if (ch.textContent.trim().toLowerCase() === label.toLowerCase()) ch.classList.add('active');
    });
  }
  
  applyFilters();
})();
</script>
